<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración de Carteras</title>
<style>
  /* =====================================================================
     cw- : Design system de la seccion "Cartera por comitente"
     Paleta, tipografia y espaciados aislados bajo .cw-app para poder
     repintar esta seccion sin afectar al resto del sitio si se agregan
     mas pestañas mas adelante.
     ===================================================================== */
  .cw-app {
    /* --- Superficies --- */
    --cw-bg: #111827;
    --cw-bg-sidebar: #0f172a;
    --cw-panel: #1e293b;
    --cw-panel-2: #243244;
    --cw-border: rgba(255, 255, 255, 0.08);
    --cw-border-strong: rgba(255, 255, 255, 0.14);

    /* --- Texto --- */
    --cw-text: #f8fafc;
    --cw-text-secondary: #cbd5e1;
    --cw-text-tertiary: #94a3b8;

    /* --- Acento y semaforo --- */
    --cw-primary: #3b82f6;
    --cw-primary-soft: rgba(59, 130, 246, 0.14);
    --cw-green: #22c55e;
    --cw-green-soft: rgba(34, 197, 94, 0.14);
    --cw-red: #ef4444;
    --cw-red-soft: rgba(239, 68, 68, 0.14);

    /* --- Radios y sombras --- */
    --cw-radius-sm: 10px;
    --cw-radius-md: 14px;
    --cw-radius-lg: 18px;
    --cw-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.28);
    --cw-shadow-md: 0 10px 30px rgba(0, 0, 0, 0.32);

    /* --- Escala tipografica --- */
    --cw-fs-display: 36px;
    --cw-fs-h1: 24px;
    --cw-fs-kpi: 30px;
    --cw-fs-section: 12px;
    --cw-fs-body: 14px;
    --cw-fs-secondary: 13px;
    --cw-fs-label: 11px;

    /* --- Escala de espaciado --- */
    --cw-sp-1: 4px;
    --cw-sp-2: 8px;
    --cw-sp-3: 12px;
    --cw-sp-4: 16px;
    --cw-sp-5: 24px;
    --cw-sp-6: 32px;
    --cw-sp-7: 40px;

    /* Colores por tipo de instrumento */
    --cw-c-on: #3b82f6;
    --cw-c-bonos: #60a5fa;
    --cw-c-cedear: #38bdf8;
    --cw-c-acciones: #f59e0b;
    --cw-c-letras: #22c55e;
    --cw-c-futuros: #a78bfa;
    --cw-c-opcion: #fb923c;
    --cw-c-default: #64748b;

    /* Fallback explicito: estas variables solo existen dentro de .cw-app,
       asi que el fondo/color no le llegan al <body> (es ancestro, no
       descendiente). Se fijan aca tambien para que toda la app quede
       cubierta aunque html/body no puedan resolver la variable. */
    background: var(--cw-bg);
    color: var(--cw-text);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--cw-bg);
    color: var(--cw-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: var(--cw-fs-body);
  }

  .cw-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  a, button { font-family: inherit; }

  :focus-visible {
    outline: 2px solid var(--cw-primary);
    outline-offset: 2px;
  }

  /* ---------- Top bar ---------- */
  .cw-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--cw-sp-4) var(--cw-sp-6);
    background: var(--cw-bg-sidebar);
    border-bottom: 1px solid var(--cw-border);
    flex-shrink: 0;
  }
  .cw-header h1 {
    font-size: 15px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--cw-text);
  }
  .cw-header .cw-header-sub {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    font-variant-numeric: tabular-nums;
  }
  .cw-header-left {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-3);
  }
  .cw-lab-btn {
    font-size: var(--cw-fs-label);
    font-weight: 700;
    color: #fff;
    background: var(--cw-primary);
    border: none;
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: background .15s ease;
  }
  .cw-lab-btn:hover {
    background: #2563eb;
  }

  /* ---------- Layout principal ---------- */
  .cw-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---------- Sidebar ---------- */
  .cw-sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--cw-bg-sidebar);
    border-right: 1px solid var(--cw-border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cw-search-wrap {
    padding: var(--cw-sp-4);
    border-bottom: 1px solid var(--cw-border);
    flex-shrink: 0;
  }
  .cw-search-input-wrap {
    position: relative;
  }
  .cw-search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cw-text-tertiary);
    pointer-events: none;
  }
  .cw-search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 32px;
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-sm);
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text);
    background: rgba(255, 255, 255, 0.03);
    outline: none;
    transition: border-color .2s ease, background .2s ease;
  }
  .cw-search-wrap input::placeholder {
    color: var(--cw-text-tertiary);
  }
  .cw-search-wrap input:focus {
    border-color: var(--cw-primary);
    background: rgba(255, 255, 255, 0.05);
  }
  .cw-search-count {
    margin-top: var(--cw-sp-2);
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .cw-list {
    flex: 1;
    overflow-y: auto;
    padding: var(--cw-sp-2) var(--cw-sp-2);
  }
  .cw-list-item {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-3);
    padding: var(--cw-sp-3);
    margin-bottom: 2px;
    border-radius: var(--cw-radius-sm);
    cursor: pointer;
    transition: background .15s ease;
  }
  .cw-list-item:hover {
    background: rgba(255, 255, 255, 0.04);
  }
  .cw-list-item.is-active {
    background: var(--cw-primary-soft);
  }
  .cw-list-item.is-active .cw-item-name {
    color: var(--cw-text);
  }
  .cw-avatar {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--cw-panel-2);
    color: var(--cw-text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .01em;
  }
  .cw-list-item.is-active .cw-avatar {
    background: var(--cw-primary);
    color: #fff;
  }
  .cw-item-body {
    min-width: 0;
    flex: 1;
  }
  .cw-list-item .cw-item-name {
    font-size: var(--cw-fs-secondary);
    font-weight: 600;
    color: var(--cw-text-secondary);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cw-list-item .cw-item-meta {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .cw-list-empty {
    padding: var(--cw-sp-6) var(--cw-sp-4);
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text-tertiary);
    text-align: center;
  }

  /* ---------- Panel derecho ---------- */
  .cw-main {
    flex: 1;
    overflow-y: auto;
    padding: var(--cw-sp-6) var(--cw-sp-7);
    min-height: 0;
    background: var(--cw-bg);
  }

  .cw-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--cw-text-tertiary);
    gap: var(--cw-sp-2);
  }
  .cw-placeholder .cw-placeholder-title {
    font-size: var(--cw-fs-h1);
    font-weight: 700;
    color: var(--cw-text);
  }
  .cw-placeholder-stats {
    margin-top: var(--cw-sp-5);
    display: flex;
    gap: var(--cw-sp-3);
  }
  .cw-stat-chip {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-md);
    padding: var(--cw-sp-3) var(--cw-sp-5);
    box-shadow: var(--cw-shadow-sm);
  }
  .cw-stat-chip .cw-stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--cw-text);
    font-variant-numeric: tabular-nums;
  }
  .cw-stat-chip .cw-stat-label {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* ---------- Encabezado ejecutivo del comitente ---------- */
  .cw-exec-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--cw-sp-6);
    padding-bottom: var(--cw-sp-5);
    margin-bottom: var(--cw-sp-5);
    border-bottom: 1px solid var(--cw-border);
    flex-wrap: wrap;
  }
  .cw-exec-identity {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-4);
    min-width: 0;
  }
  .cw-exec-avatar {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(160deg, var(--cw-primary), #1d4ed8);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
  }
  .cw-exec-name {
    font-size: var(--cw-fs-h1);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--cw-text);
    line-height: 1.25;
  }
  .cw-exec-tag {
    display: inline-flex;
    align-items: center;
    margin-top: var(--cw-sp-1);
    font-size: var(--cw-fs-label);
    font-weight: 600;
    color: var(--cw-text-tertiary);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--cw-border);
    padding: 2px 8px;
    border-radius: 20px;
    font-variant-numeric: tabular-nums;
  }
  .cw-exec-total {
    text-align: right;
    flex-shrink: 0;
  }
  .cw-exec-total .cw-exec-total-label {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 600;
  }
  .cw-exec-total .cw-exec-total-value {
    font-size: var(--cw-fs-display);
    font-weight: 800;
    color: var(--cw-text);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    line-height: 1.15;
  }
  .cw-exec-total .cw-exec-total-date {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-1);
  }

  /* ---------- Cards ---------- */
  .cw-card {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-lg);
    box-shadow: var(--cw-shadow-sm);
    padding: var(--cw-sp-5);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-card-title {
    font-size: var(--cw-fs-section);
    font-weight: 700;
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 0 0 var(--cw-sp-4) 0;
  }

  /* ---------- Composicion: barra apilada + leyenda ---------- */
  .cw-stacked-bar {
    display: flex;
    width: 100%;
    height: 10px;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.04);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-stacked-seg {
    height: 100%;
    transition: opacity .15s ease;
  }
  .cw-stacked-seg:hover {
    opacity: 0.82;
  }

  .cw-type-row {
    display: grid;
    grid-template-columns: 1fr 130px 64px;
    align-items: center;
    gap: var(--cw-sp-3);
    padding: var(--cw-sp-2) 0;
    font-size: var(--cw-fs-secondary);
    border-top: 1px solid var(--cw-border);
  }
  .cw-type-row:first-of-type {
    border-top: none;
  }
  .cw-type-row .cw-type-name {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-2);
    font-weight: 600;
    color: var(--cw-text-secondary);
  }
  .cw-type-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cw-type-amount {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text);
    font-weight: 600;
  }
  .cw-type-pct {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text-tertiary);
  }

  .cw-beta-summary {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-top: var(--cw-sp-3);
    padding-top: var(--cw-sp-4);
    border-top: 1px solid var(--cw-border-strong);
  }
  .cw-beta-label {
    font-size: var(--cw-fs-secondary);
    font-weight: 600;
    color: var(--cw-text-secondary);
  }
  .cw-beta-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--cw-text);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Tabla de tenencias ---------- */
  .cw-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--cw-fs-secondary);
  }
  .cw-table thead th {
    text-align: left;
    font-size: var(--cw-fs-label);
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--cw-text-tertiary);
    font-weight: 700;
    padding: 0 var(--cw-sp-3) var(--cw-sp-3) var(--cw-sp-3);
    border-bottom: 1px solid var(--cw-border);
  }
  .cw-table thead th.cw-num {
    text-align: right;
  }
  .cw-table tbody td {
    padding: 11px var(--cw-sp-3);
    border-bottom: 1px solid var(--cw-border);
    color: var(--cw-text-secondary);
  }
  .cw-table tbody tr:last-child td {
    border-bottom: none;
  }
  .cw-table tbody tr {
    transition: background .12s ease;
  }
  .cw-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.025);
  }
  .cw-table td.cw-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .cw-ticker {
    font-weight: 700;
    color: var(--cw-text);
  }
  .cw-tipo-tag {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--cw-text-tertiary);
  }
  .cw-metric-pos { color: var(--cw-green); }
  .cw-metric-neg { color: var(--cw-red); }
  .cw-metric-na {
    color: var(--cw-text-tertiary);
    font-style: italic;
    font-size: 12px;
  }
  .cw-metric-note {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-3);
    line-height: 1.5;
  }

  /* ---------- Tarjetas KPI de escenario ---------- */
  .cw-scenario-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--cw-sp-4);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-scenario-card {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-lg);
    box-shadow: var(--cw-shadow-sm);
    padding: var(--cw-sp-5);
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .cw-scenario-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--cw-shadow-md);
    border-color: var(--cw-border-strong);
  }
  .cw-scenario-card.is-active {
    border-color: var(--cw-primary);
  }
  .cw-scenario-title {
    font-size: var(--cw-fs-label);
    font-weight: 700;
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: var(--cw-sp-3);
  }
  .cw-scenario-total {
    font-size: var(--cw-fs-kpi);
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text);
  }
  .cw-scenario-desc {
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text-secondary);
    margin-top: var(--cw-sp-2);
    line-height: 1.45;
  }
  .cw-scenario-action {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: var(--cw-fs-label);
    font-weight: 600;
    color: var(--cw-primary);
    margin-top: var(--cw-sp-4);
    padding-top: var(--cw-sp-3);
    border-top: 1px solid var(--cw-border);
  }
  .cw-scenario-coverage {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-3);
    font-style: italic;
    line-height: 1.5;
  }
  .cw-scenario-detail {
    background: var(--cw-panel-2);
  }

  /* ---------- Card con boton de mostrar/ocultar (detalle por instrumento) --------- */
  .cw-card-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--cw-sp-4);
  }
  .cw-card-title-row .cw-card-title {
    margin: 0;
  }
  .cw-toggle-btn {
    font-size: var(--cw-fs-label);
    font-weight: 600;
    color: var(--cw-primary);
    background: var(--cw-primary-soft);
    border: 1px solid transparent;
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .cw-toggle-btn:hover {
    background: rgba(59, 130, 246, 0.24);
  }

  /* ---------- Editor what-if (% hipotético dentro del detalle de escenario) ---------- */
  .cw-hipo-input {
    width: 68px;
    padding: 4px 6px;
    border: 1px solid var(--cw-border);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--cw-text);
    font-size: var(--cw-fs-secondary);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .cw-hipo-remove {
    margin-left: 6px;
    border: none;
    background: transparent;
    color: var(--cw-text-tertiary);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .cw-hipo-remove:hover {
    color: var(--cw-red);
  }
  .cw-hipo-add-row {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-2);
    margin-top: var(--cw-sp-4);
    flex-wrap: wrap;
  }
  .cw-hipo-add-select, .cw-lab-add-row select {
    padding: 7px 10px;
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-sm);
    background: var(--cw-panel-2);
    color: var(--cw-text);
    font-size: var(--cw-fs-secondary);
  }
  .cw-hipo-compare {
    display: flex;
    gap: var(--cw-sp-5);
    margin-top: var(--cw-sp-4);
    padding-top: var(--cw-sp-4);
    border-top: 1px solid var(--cw-border-strong);
  }
  .cw-hipo-compare-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cw-hipo-compare-item span {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .cw-hipo-compare-item strong {
    font-size: 20px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- LAB (cartera hipotetica desde cero) ---------- */
  .cw-lab-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: var(--cw-sp-5);
    flex-wrap: wrap;

  ::-webkit-scrollbar { width: 8px; height: 8px; }

</style>

<body>

<div class="cw-app">
  <header class="cw-header">
    <div class="cw-header-left">
      <h1>Administración de Carteras</h1>
      <button type="button" id="cw-lab-btn" class="cw-lab-btn">LAB</button>
    </div>
    <span class="cw-header-sub" id="cw-header-fecha"></span>
  </header>

  <div class="cw-body">
    <aside class="cw-sidebar">
      <div class="cw-search-wrap">
        <div class="cw-search-input-wrap">
          <svg class="cw-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="cw-search" placeholder="Buscar por nombre o número…" autocomplete="off">
        </div>
        <div class="cw-search-count" id="cw-search-count"></div>
      </div>
      <div class="cw-list" id="cw-list"></div>
    </aside>

    <main class="cw-main" id="cw-main">
      <div class="cw-placeholder" id="cw-placeholder">
        <div class="cw-placeholder-title">Seleccioná un comitente</div>
        <div>Elegí un comitente de la lista para ver el detalle de su cartera.</div>
        <div class="cw-placeholder-stats" id="cw-placeholder-stats"></div>
      </div>
      <div id="cw-detail" style="display:none;"></div>
      <div id="cw-lab" style="display:none;"></div>
    </main>
  </div>
</div>

<script>
(function () {
  var DATA_URL = 'data/tenencias.json';
  var METRICAS_URL = 'data/metricas.json';
  var RENTA_FIJA_URL = 'data/renta_fija.json';
  var data = null;
  var metricas = null;
  var rentaFija = null;
  var filtered = [];
  var activeComitente = null;
  var TIPOS_CON_METRICAS = { 'Acciones': true, 'Cedear': true };
  var TIPOS_RENTA_FIJA = { 'ON': true, 'Bonos': true, 'Letras': true };
  var TIPOS_RENTA_VARIABLE = { 'Acciones': true, 'Cedear': true };

  // Universo completo de tickers disponibles (ON, Bonos, Letras, Acciones,
  // Cedear) para el LAB y el editor what-if: se arma escaneando una vez
  // todas las tenencias de todos los comitentes (no hace falta pegar un
  // listado aparte, ya esta todo en tenencias.json).
  var TICKER_UNIVERSE = [];
  function buildTickerUniverse() {
    var seen = {};
    var list = [];
    data.comitentes.forEach(function (c) {
      c.tenencias.forEach(function (t) {
        if (!seen[t.ticker]) {
          seen[t.ticker] = true;
          list.push({ ticker: t.ticker, tipo: t.tipo });
        }
      });
    });
    list.sort(function (a, b) { return a.ticker < b.ticker ? -1 : (a.ticker > b.ticker ? 1 : 0); });
    TICKER_UNIVERSE = list;
  }
  function buildTickerOptionsHtml(excludeMap) {
    excludeMap = excludeMap || {};
    var opts = ['<option value="">Elegí un ticker…</option>'];
    TICKER_UNIVERSE.forEach(function (item) {
      if (excludeMap[item.ticker]) return;
      opts.push('<option value="' + item.ticker + '|' + item.tipo + '">' + item.ticker + ' (' + item.tipo + ')</option>');
    });
    return opts.join('');
  }

  // Estado del editor what-if (% hipotético dentro del detalle de cada
  // escenario, en la vista de un comitente real). Es temporal: se resetea
  // al cambiar de comitente o recargar la página (a pedido del usuario).
  var whatIfState = { comitenteId: null, overrides: {}, added: [] };
  function resetWhatIfState(comitenteId) {
    if (whatIfState.comitenteId !== comitenteId) {
      whatIfState = { comitenteId: comitenteId, overrides: {}, added: [] };
    }
  }

  // Estado del LAB (cartera hipotética armada desde cero). También
  // temporal en cuanto a la edición en curso; lo único persistente son las
  // carteras que el usuario decide guardar explícitamente (localStorage).
  var labState = { modo: 'pct', capitalTotal: 100000, items: [] };
  var labOpen = false;
  var labCompararSeleccion = [];
  var LAB_STORAGE_KEY = 'cw_lab_carteras';
  function leerCarterasGuardadas() {
    try {
      var raw = localStorage.getItem(LAB_STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function guardarCarterasEnStorage(carteras) {
    try {
      localStorage.setItem(LAB_STORAGE_KEY, JSON.stringify(carteras));
    } catch (e) { /* localStorage no disponible: se ignora silenciosamente */ }
  }

  var ESCENARIOS_RV = [
    {
      key: 'sma200',
      label: 'Reversión a media de 200 ruedas',
      descripcion: 'Asume que cada acción/cedear converge a su precio promedio de las últimas 200 ruedas.',
      retorno: function (m) {
        if (!m || m.sma200_usd === null || m.sma200_usd === undefined || !m.precio_actual_usd) return null;
        return (m.sma200_usd - m.precio_actual_usd) / m.precio_actual_usd * 100;
      }
    },
    {
      key: 'cagr',
      label: 'Continuidad del rendimiento anual (CAGR 10a)',
      descripcion: 'Asume que cada acción/cedear mantiene su tasa de crecimiento anual promedio histórica.',
      retorno: function (m) {
        if (!m || m.rendimiento_anual_pct === null || m.rendimiento_anual_pct === undefined) return null;
        return m.rendimiento_anual_pct;
      }
    },
    {
      key: 'maximo',
      label: 'Recuperación al máximo histórico',
      descripcion: 'Asume que cada acción/cedear recupera su máximo precio histórico dentro de la ventana de datos.',
      retorno: function (m) {
        if (!m || m.maximo_periodo_usd === null || m.maximo_periodo_usd === undefined || !m.precio_actual_usd) return null;
        return (m.maximo_periodo_usd - m.precio_actual_usd) / m.precio_actual_usd * 100;
      }
    },
    {
      key: 'drawdown',
      label: 'Caída histórica extrema',
      descripcion: 'Escenario bajista: asume que cada acción/cedear repite su peor caída pico-a-valle real dentro de la ventana de datos, partiendo del precio actual.',
      retorno: function (m) {
        if (!m || m.maximo_drawdown_pct === null || m.maximo_drawdown_pct === undefined) return null;
        return m.maximo_drawdown_pct;
      }
    }
  ];

  var TYPE_COLOR = {
    'ON': 'var(--cw-c-on)',
    'Bonos': 'var(--cw-c-bonos)',
    'Cedear': 'var(--cw-c-cedear)',
    'Acciones': 'var(--cw-c-acciones)',
    'Letras': 'var(--cw-c-letras)',
    'Futuros': 'var(--cw-c-futuros)',
    'Opción de Futuro': 'var(--cw-c-opcion)'
  };

  function tipoColor(tipo) {
    return TYPE_COLOR[tipo] || 'var(--cw-c-default)';
  }

  // Mapa ticker -> sector. Cubre Acciones/Cedear (segun el negocio principal
  // de cada compania/ETF) y ON (segun el sector de la empresa emisora,
  // investigado manualmente). Tickers no mapeados caen en "Otros" al
  // calcular la composicion por sector.
  var SECTOR_MAP = {
    // --- Acciones / Cedear ---
    AAPL: 'Tecnología', ABT: 'Salud', ADBE: 'Tecnología', ADGO: 'Consumo/Agro',
    AMD: 'Tecnología', AMZN: 'Consumo Discrecional', AXP: 'Financiero',
    BABA: 'Consumo Discrecional', BBAR: 'Financiero', BKNG: 'Consumo Discrecional',
    BMA: 'Financiero', BRKB: 'Financiero', BYMA: 'Financiero', CEPU: 'Energía',
    COIN: 'Financiero', COPX: 'Minería', CRES: 'Real Estate/Agro', DISN: 'Comunicación',
    EDN: 'Energía', EEM: 'Diversificado', ETHA: 'Cripto', EWZ: 'Diversificado',
    FCX: 'Minería', FXI: 'Diversificado', GDX: 'Minería', GGAL: 'Financiero',
    GLD: 'Commodities', GOOGL: 'Tecnología', GPRK: 'Energía', IBIT: 'Cripto',
    IBM: 'Tecnología', ILF: 'Diversificado', IRSA: 'Real Estate', KO: 'Consumo Masivo',
    LOMA: 'Materiales', MCD: 'Consumo Discrecional', MELI: 'Tecnología',
    META: 'Tecnología', MOLI: 'Consumo Masivo', MSFT: 'Tecnología', MSTR: 'Tecnología',
    NFLX: 'Comunicación', NKE: 'Consumo Discrecional', NU: 'Financiero', NVDA: 'Tecnología',
    OKLO: 'Energía', ORCL: 'Tecnología', PAMP: 'Energía', PEP: 'Consumo Masivo',
    PLTR: 'Tecnología', PYPL: 'Financiero', QQQ: 'Diversificado', SMH: 'Tecnología',
    SPCX: 'Tecnología', SPOT: 'Comunicación', SPXL: 'Diversificado', SPY: 'Diversificado',
    SUPV: 'Financiero', TQQQ: 'Diversificado', TSLA: 'Consumo Discrecional', TSM: 'Tecnología',
    UBER: 'Tecnología', URA: 'Energía', V: 'Financiero', VEA: 'Diversificado',
    VIST: 'Energía', WMT: 'Consumo Masivo', XLF: 'Financiero', XLP: 'Consumo Masivo',
    XLV: 'Salud', YPFD: 'Energía', TGNO4: 'Energía', TRAN: 'Energía', TXAR: 'Materiales',
    // --- ON, segun sector de la empresa emisora ---
    YFCJO: 'Energía', YM34O: 'Energía', YM39O: 'Energía', YMCIO: 'Energía',
    YMCJO: 'Energía', YMCXO: 'Energía', YMCYO: 'Energía',
    MGCNO: 'Energía', MGCOO: 'Energía', MGCRO: 'Energía',
    VSCRO: 'Energía', VSCTO: 'Energía', VSCUO: 'Energía', VSCVO: 'Energía',
    PLC2O: 'Energía', PLC4O: 'Energía', PLC5O: 'Energía',
    TSC3O: 'Energía', TSC4O: 'Energía', TTC9O: 'Energía',
    PN35O: 'Energía', PNXCO: 'Energía', RUCDO: 'Energía', MSSEO: 'Energía',
    GN43O: 'Energía', MRCAO: 'Energía', MR46O: 'Energía', MR47O: 'Energía',
    PECMO: 'Energía', PECNO: 'Energía', ICC6O: 'Energía', TTCEO: 'Energía',
    DEC2O: 'Energía', DNC3O: 'Energía', DNC5O: 'Energía',
    IRCFO: 'Real Estate', IRCJO: 'Real Estate', IRCPO: 'Real Estate', IRCQO: 'Real Estate',
    TLCPO: 'Comunicación', TLCWO: 'Comunicación',
    LOC5O: 'Materiales', LMS7O: 'Materiales', CRCJO: 'Materiales',
    AFCIO: 'Financiero', SBC1O: 'Financiero',
    SNEBO: 'Consumo/Agro', CS47O: 'Consumo/Agro',
    HJCIO: 'Industrial',
    XMC1O: 'Minería'
  };

  var SECTOR_COLOR_PALETTE = ['#3b82f6', '#f59e0b', '#22c55e', '#a78bfa', '#38bdf8', '#fb923c', '#ec4899', '#84cc16'];

  function sectorColor(sector, idx) {
    if (sector === 'Otros') return 'var(--cw-c-default)';
    return SECTOR_COLOR_PALETTE[idx % SECTOR_COLOR_PALETTE.length];
  }

  // Composicion por sector, solo sobre ON + Acciones + Cedear (a pedido del
  // usuario; Bonos, Letras, Futuros y Opcion de Futuro no tienen un sector
  // de negocio propio). Se muestran los 4 sectores de mayor peso y el resto
  // se agrupa en "Otros" (incluye tambien los tickers sin sector mapeado).
  var TIPOS_CON_SECTOR = { 'ON': true, 'Acciones': true, 'Cedear': true };
  function computeSectorBreakdown(comitente) {
    var items = comitente.tenencias.filter(function (t) { return !!TIPOS_CON_SECTOR[t.tipo]; });
    var base = items.reduce(function (s, t) { return s + t.importe; }, 0);
    if (base <= 0) return null;

    var totals = {};
    items.forEach(function (t) {
      var sector = SECTOR_MAP[t.ticker] || 'Otros';
      totals[sector] = (totals[sector] || 0) + t.importe;
    });

    var rows = Object.keys(totals).map(function (sector) {
      return { sector: sector, importe: totals[sector] };
    });
    rows.sort(function (a, b) { return b.importe - a.importe; });

    var top = rows.filter(function (r) { return r.sector !== 'Otros'; }).slice(0, 4);
    var restoImporte = rows.reduce(function (s, r) { return s + r.importe; }, 0) - top.reduce(function (s, r) { return s + r.importe; }, 0);

    var finalRows = top.map(function (r) { return { sector: r.sector, importe: r.importe, pct: (r.importe / base) * 100 }; });
    if (restoImporte > 0) {
      finalRows.push({ sector: 'Otros', importe: restoImporte, pct: (restoImporte / base) * 100 });
    }
    return { rows: finalRows, base: base };
  }

  function initials(nombre) {
    if (!nombre) return '?';
    var partes = nombre.trim().split(/\s+/).filter(Boolean);
    if (!partes.length) return '?';
    if (partes.length === 1) return partes[0].substring(0, 2).toUpperCase();
    return (partes[0].charAt(0) + partes[1].charAt(0)).toUpperCase();
  }

  function normalize(s) {
    return (s || '')
      .toString()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase();
  }

  function fmtMoney(n) {
    return '$ ' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPct(n) {
    return Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
  }

  function fmtMetricPct(n) {
    if (n === null || n === undefined) return '<span class="cw-metric-na">s/d</span>';
    var cls = n > 0 ? 'cw-metric-pos' : (n < 0 ? 'cw-metric-neg' : '');
    var sign = n > 0 ? '+' : '';
    return '<span class="' + cls + '">' + sign + fmtPct(n) + '</span>';
  }

  function metricasDeTicker(ticker) {
    if (!metricas || !metricas.tickers) return null;
    return metricas.tickers[ticker] || null;
  }

  function rentaFijaDeTicker(ticker) {
    if (!rentaFija || !rentaFija.tickers) return null;
    return rentaFija.tickers[ticker] || null;
  }

  function fmtSignedPct(n) {
    var sign = n > 0 ? '+' : '';
    return sign + fmtPct(n);
  }

  // Calcula, para un comitente, el rendimiento esperado de su cartera bajo
  // los 3 escenarios de renta variable, combinado con la TIR de su renta
  // fija (ON, Bonos, Letras). Excluye por completo Futuros y Opción de
  // Futuro (no se consideran en esta estimación, a pedido del usuario).
  function computeRendimientoEsperado(comitente) {
    var rfItems = comitente.tenencias.filter(function (t) { return !!TIPOS_RENTA_FIJA[t.tipo]; });
    var rvItems = comitente.tenencias.filter(function (t) { return !!TIPOS_RENTA_VARIABLE[t.tipo]; });

    var rfTotal = rfItems.reduce(function (s, t) { return s + t.importe; }, 0);
    var rvTotal = rvItems.reduce(function (s, t) { return s + t.importe; }, 0);
    var baseTotal = rfTotal + rvTotal;
    if (baseTotal <= 0) return null;

    var pesoRF = rfTotal / baseTotal;
    var pesoRV = rvTotal / baseTotal;

    var rfSumPonderado = 0, rfImporteConDato = 0;
    rfItems.forEach(function (t) {
      var rf = rentaFijaDeTicker(t.ticker);
      if (rf && typeof rf.tir_usd_pct === 'number') {
        rfSumPonderado += t.importe * rf.tir_usd_pct;
        rfImporteConDato += t.importe;
      }
    });
    var rfRendimiento = rfImporteConDato > 0 ? rfSumPonderado / rfImporteConDato : null;
    var rfCobertura = rfTotal > 0 ? (rfImporteConDato / rfTotal) * 100 : null;

    var escenarios = ESCENARIOS_RV.map(function (esc) {
      var sumPonderado = 0, importeConDato = 0;
      var filas = [];

      rfItems.forEach(function (t) {
        var rf = rentaFijaDeTicker(t.ticker);
        var rendimiento = (rf && typeof rf.tir_usd_pct === 'number') ? rf.tir_usd_pct : null;
        filas.push({ ticker: t.ticker, tipo: t.tipo, rendimiento: rendimiento, pctTotal: t.participacion_pct, importe: t.importe });
      });

      rvItems.forEach(function (t) {
        var m = metricasDeTicker(t.ticker);
        var retorno = (m && !m.sin_dato_usd) ? esc.retorno(m) : null;
        if (retorno !== null && retorno !== undefined) {
          sumPonderado += t.importe * retorno;
          importeConDato += t.importe;
        }
        filas.push({ ticker: t.ticker, tipo: t.tipo, rendimiento: (retorno !== null && retorno !== undefined) ? retorno : null, pctTotal: t.participacion_pct, importe: t.importe });
      });

      filas.sort(function (a, b) { return b.importe - a.importe; });

      var rvRendimiento = importeConDato > 0 ? sumPonderado / importeConDato : null;
      var rvCobertura = rvTotal > 0 ? (importeConDato / rvTotal) * 100 : null;

      var total = pesoRF * (rfRendimiento || 0) + pesoRV * (rvRendimiento || 0);

      return {
        label: esc.label,
        descripcion: esc.descripcion,
        rfRendimiento: rfRendimiento,
        rfCobertura: rfCobertura,
        rvRendimiento: rvRendimiento,
        rvCobertura: rvCobertura,
        total: total,
        filas: filas
      };
    });

    return {
      pesoRF: pesoRF,
      pesoRV: pesoRV,
      rfTotal: rfTotal,
      rvTotal: rvTotal,
      escenarios: escenarios
    };
  }

  function renderFilaDetalle(f) {
    var rendHtml = (f.rendimiento !== null && f.rendimiento !== undefined)
      ? fmtMetricPct(f.rendimiento)
      : '<span class="cw-metric-na">s/d</span>';
    return (
      '<tr>' +
        '<td class="cw-ticker">' + f.ticker + '</td>' +
        '<td><span class="cw-tipo-tag">' + f.tipo + '</span></td>' +
        '<td class="cw-num">' + rendHtml + '</td>' +
        '<td class="cw-num">' + fmtPct(f.pctTotal) + '</td>' +
      '</tr>'
    );
  }

  // Construye el markup de las tarjetas KPI de escenario (con click para
  // desplegar, debajo de la grilla, el detalle por instrumento de ESE
  // escenario). Si conHipo=true (vista de un comitente real), el detalle
  // desplegado incluye el editor what-if de % hipotético; si es false (LAB),
  // se muestra el detalle simple, sin edición (el LAB ya tiene su propio
  // editor de composición en el panel principal).
  function buildEscenariosMarkup(comitente, conHipo) {
    var r = computeRendimientoEsperado(comitente);
    if (!r) return null;

    var cardsHtml = r.escenarios.map(function (esc, idx) {
      var totalCls = esc.total > 0 ? 'cw-metric-pos' : (esc.total < 0 ? 'cw-metric-neg' : '');
      return (
        '<div class="cw-scenario-card" data-esc-idx="' + idx + '">' +
          '<div class="cw-scenario-title">' + esc.label + '</div>' +
          '<div class="cw-scenario-total ' + totalCls + '">' + fmtSignedPct(esc.total) + '</div>' +
          '<div class="cw-scenario-desc">' + esc.descripcion + '</div>' +
          '<div class="cw-scenario-action">Ver rendimientos por instrumento <span>&rarr;</span></div>' +
        '</div>'
      );
    }).join('');

    var html = (
      '<div class="cw-card">' +
        '<div class="cw-card-title">Rendimiento esperado por escenario</div>' +
        '<div class="cw-scenario-grid">' + cardsHtml + '</div>' +
        '<div class="cw-metric-note">Renta fija (ON, Bonos, Letras) a su TIR en dólares (planilla de seguimiento, o 6% fijo cuando no hay dato de mercado). Renta variable (Acciones, Cedear) según el escenario. No incluye Futuros ni Opción de Futuro.</div>' +
      '</div>' +
      '<div id="cw-escenario-detalle" style="display:none;"></div>'
    );

    return { html: html, escenarios: r.escenarios, conHipo: !!conHipo };
  }

  function coberturaNotasHtml(esc) {
    var notas = [];
    if (esc.rfCobertura !== null && esc.rfCobertura < 99.95) {
      notas.push('Renta fija con TIR disponible: ' + fmtPct(esc.rfCobertura) + ' del bloque.');
    }
    if (esc.rvCobertura !== null && esc.rvCobertura < 99.95) {
      notas.push('Renta variable con dato para este escenario: ' + fmtPct(esc.rvCobertura) + ' del bloque.');
    }
    return notas.length ? '<div class="cw-scenario-coverage">' + notas.join(' ') + '</div>' : '';
  }

  // Detalle simple de escenario (sin editor what-if): usado en el LAB.
  function renderEscenarioDetalleEstaticoHtml(esc) {
    var filasHtml = esc.filas.map(renderFilaDetalle).join('');
    return (
      '<div class="cw-card cw-scenario-detail">' +
        '<div class="cw-card-title">Rendimientos considerados — ' + esc.label + '</div>' +
        '<table class="cw-table">' +
          '<thead><tr>' +
            '<th>Ticker</th><th>Tipo</th><th class="cw-num">Rendimiento usado</th><th class="cw-num">% s/ total cartera</th>' +
          '</tr></thead>' +
          '<tbody>' + filasHtml + '</tbody>' +
        '</table>' +
        coberturaNotasHtml(esc) +
      '</div>'
    );
  }

  // Combina, con la misma metodologia de "excluir y prorratear" que
  // computeRendimientoEsperado, el rendimiento total hipotetico de la
  // cartera bajo un escenario, a partir de una lista de filas con su %
  // hipotetico (hipoPct) en vez de su importe real.
  function computeHipoTotal(filas) {
    var rf = filas.filter(function (f) { return !!TIPOS_RENTA_FIJA[f.tipo]; });
    var rv = filas.filter(function (f) { return !!TIPOS_RENTA_VARIABLE[f.tipo]; });
    function pesoDe(items) {
      return items.reduce(function (s, f) { return s + f.hipoPct; }, 0) / 100;
    }
    function rendimientoPonderado(items) {
      var sumP = 0, sumW = 0;
      items.forEach(function (f) {
        if (f.rendimiento !== null && f.rendimiento !== undefined && f.hipoPct > 0) {
          sumP += f.hipoPct * f.rendimiento;
          sumW += f.hipoPct;
        }
      });
      return sumW > 0 ? sumP / sumW : null;
    }
    var pesoRF = pesoDe(rf);
    var pesoRV = pesoDe(rv);
    var rfRend = rendimientoPonderado(rf);
    var rvRend = rendimientoPonderado(rv);
    return pesoRF * (rfRend || 0) + pesoRV * (rvRend || 0);
  }

  // Detalle de escenario CON editor what-if: cada fila tiene, ademas del %
  // actual (fijo, viene de la cartera real), un % hipotetico editable.
  // Tambien permite agregar tickers nuevos (que no estan en la cartera
  // real) con su propio % hipotetico. Todo esto vive en whatIfState, que es
  // compartido entre las 4 tarjetas de escenario y se resetea al cambiar de
  // comitente o recargar la pagina.
  function renderEscenarioDetalleHtml(escIdx, esc) {
    var escDef = ESCENARIOS_RV[escIdx];
    var tickersExistentes = {};
    esc.filas.forEach(function (f) { tickersExistentes[f.ticker] = true; });

    var filasAgregadas = whatIfState.added.map(function (a) {
      var rendimiento = null;
      if (TIPOS_RENTA_FIJA[a.tipo]) {
        var rf = rentaFijaDeTicker(a.ticker);
        rendimiento = (rf && typeof rf.tir_usd_pct === 'number') ? rf.tir_usd_pct : null;
      } else if (TIPOS_RENTA_VARIABLE[a.tipo]) {
        var m = metricasDeTicker(a.ticker);
        rendimiento = (m && !m.sin_dato_usd) ? escDef.retorno(m) : null;
      }
      return { ticker: a.ticker, tipo: a.tipo, rendimiento: rendimiento, pctTotal: 0, esNuevo: true };
    });

    var todas = esc.filas.map(function (f) {
      return { ticker: f.ticker, tipo: f.tipo, rendimiento: f.rendimiento, pctTotal: f.pctTotal, esNuevo: false };
    }).concat(filasAgregadas);

    var filasConHipo = todas.map(function (f) {
      var hipoPct = whatIfState.overrides[f.ticker];
      if (hipoPct === undefined) hipoPct = f.esNuevo ? 0 : f.pctTotal;
      return { ticker: f.ticker, tipo: f.tipo, rendimiento: f.rendimiento, pctTotal: f.pctTotal, esNuevo: f.esNuevo, hipoPct: hipoPct };
    });

    var hipoTotal = computeHipoTotal(filasConHipo);

    var filasHtml = filasConHipo.map(function (f) {
      var rendHtml = (f.rendimiento !== null && f.rendimiento !== undefined) ? fmtMetricPct(f.rendimiento) : '<span class="cw-metric-na">s/d</span>';
      var quitarBtn = f.esNuevo ? '<button type="button" class="cw-hipo-remove" data-ticker="' + f.ticker + '" title="Quitar">&times;</button>' : '';
      return (
        '<tr>' +
          '<td class="cw-ticker">' + f.ticker + (f.esNuevo ? ' <span class="cw-tipo-tag">nuevo</span>' : '') + '</td>' +
          '<td><span class="cw-tipo-tag">' + f.tipo + '</span></td>' +
          '<td class="cw-num">' + rendHtml + '</td>' +
          '<td class="cw-num">' + fmtPct(f.pctTotal) + '</td>' +
          '<td class="cw-num"><input type="number" class="cw-hipo-input" data-ticker="' + f.ticker + '" min="0" max="100" step="0.1" value="' + f.hipoPct.toFixed(2) + '"> %' + quitarBtn + '</td>' +
        '</tr>'
      );
    }).join('');

    var tickerOptionsHtml = buildTickerOptionsHtml(tickersExistentes);
    var totalClsActual = esc.total > 0 ? 'cw-metric-pos' : (esc.total < 0 ? 'cw-metric-neg' : '');
    var totalClsHipo = hipoTotal > 0 ? 'cw-metric-pos' : (hipoTotal < 0 ? 'cw-metric-neg' : '');

    return (
      '<div class="cw-card cw-scenario-detail">' +
        '<div class="cw-card-title">Rendimientos considerados — ' + esc.label + '</div>' +
        '<table class="cw-table">' +
          '<thead><tr>' +
            '<th>Ticker</th><th>Tipo</th><th class="cw-num">Rendimiento usado</th><th class="cw-num">% actual</th><th class="cw-num">% hipotético</th>' +
          '</tr></thead>' +
          '<tbody>' + filasHtml + '</tbody>' +
        '</table>' +
        coberturaNotasHtml(esc) +
        '<div class="cw-hipo-add-row">' +
          '<select class="cw-hipo-add-select">' + tickerOptionsHtml + '</select>' +
          '<button type="button" class="cw-hipo-add-btn cw-toggle-btn">+ Agregar ticker</button>' +
        '</div>' +
        '<div class="cw-hipo-compare">' +
          '<div class="cw-hipo-compare-item"><span>Rendimiento actual</span><strong class="' + totalClsActual + '">' + fmtSignedPct(esc.total) + '</strong></div>' +
          '<div class="cw-hipo-compare-item"><span>Rendimiento hipotético</span><strong class="' + totalClsHipo + '">' + fmtSignedPct(hipoTotal) + '</strong></div>' +
        '</div>' +
        '<div class="cw-metric-note">Editá el % hipotético de cada fila o agregá tickers nuevos para simular otra composición. Es temporal: se pierde al cambiar de comitente o recargar la página.</div>' +
      '</div>'
    );
  }

  function wireEscenarioDetalle(escIdx, esc, contenedor) {
    var inputs = contenedor.querySelectorAll('.cw-hipo-input');
    inputs.forEach(function (inp) {
      inp.addEventListener('change', function () {
        var ticker = inp.getAttribute('data-ticker');
        var val = parseFloat(inp.value);
        if (isNaN(val) || val < 0) val = 0;
        whatIfState.overrides[ticker] = val;
        refrescarEscenarioDetalle(escIdx, esc, contenedor);
      });
    });
    var removeButtons = contenedor.querySelectorAll('.cw-hipo-remove');
    removeButtons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var ticker = btn.getAttribute('data-ticker');
        whatIfState.added = whatIfState.added.filter(function (a) { return a.ticker !== ticker; });
        delete whatIfState.overrides[ticker];
        refrescarEscenarioDetalle(escIdx, esc, contenedor);
      });
    });
    var addBtn = contenedor.querySelector('.cw-hipo-add-btn');
    if (addBtn) {
      addBtn.addEventListener('click', function () {
        var select = contenedor.querySelector('.cw-hipo-add-select');
        if (!select || !select.value) return;
        var parts = select.value.split('|');
        var ticker = parts[0], tipo = parts[1];
        var yaExiste = esc.filas.some(function (f) { return f.ticker === ticker; }) || whatIfState.added.some(function (a) { return a.ticker === ticker; });
        if (yaExiste) return;
        whatIfState.added.push({ ticker: ticker, tipo: tipo, pct: 0 });
        refrescarEscenarioDetalle(escIdx, esc, contenedor);
      });
    }
  }

  function refrescarEscenarioDetalle(escIdx, esc, contenedor) {
    contenedor.innerHTML = renderEscenarioDetalleHtml(escIdx, esc);
    wireEscenarioDetalle(escIdx, esc, contenedor);
  }

  function wireScenarioCards(built) {
    var cards = document.querySelectorAll('.cw-scenario-card');
    var contenedor = document.getElementById('cw-escenario-detalle');
    if (!cards.length || !contenedor) return;
    var activo = null;
    cards.forEach(function (card) {
      card.addEventListener('click', function () {
        var idx = parseInt(card.getAttribute('data-esc-idx'), 10);
        if (activo === idx) {
          contenedor.style.display = 'none';
          contenedor.innerHTML = '';
          card.classList.remove('is-active');
          activo = null;
          return;
        }
        cards.forEach(function (c) { c.classList.remove('is-active'); });
        card.classList.add('is-active');
        if (built.conHipo) {
          contenedor.innerHTML = renderEscenarioDetalleHtml(idx, built.escenarios[idx]);
          wireEscenarioDetalle(idx, built.escenarios[idx], contenedor);
        } else {
          contenedor.innerHTML = renderEscenarioDetalleEstaticoHtml(built.escenarios[idx]);
        }
        contenedor.style.display = 'block';
        activo = idx;
      });
    });
  }

  function el(tag, attrs, html) {
    var e = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    }
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function renderList() {
    var listEl = document.getElementById('cw-list');
    var countEl = document.getElementById('cw-search-count');
    listEl.innerHTML = '';

    if (!filtered.length) {
      listEl.appendChild(el('div', { class: 'cw-list-empty' }, 'No se encontraron comitentes.'));
      countEl.textContent = '0 comitentes';
      return;
    }

    countEl.textContent = filtered.length + (filtered.length === 1 ? ' comitente' : ' comitentes');

    filtered.forEach(function (c) {
      var item = el('div', { class: 'cw-list-item' + (c.comitente === activeComitente ? ' is-active' : '') });
      item.appendChild(el('div', { class: 'cw-avatar' }, initials(c.nombre)));
      var body = el('div', { class: 'cw-item-body' });
      body.appendChild(el('div', { class: 'cw-item-name' }, c.nombre));
      body.appendChild(el('div', { class: 'cw-item-meta' }, 'N.º ' + c.comitente + ' · ' + fmtMoney(c.total)));
      item.appendChild(body);
      item.addEventListener('click', function () { selectComitente(c.comitente); });
      listEl.appendChild(item);
    });
  }

  function applyFilter(query) {
    var q = normalize(query.trim());
    if (!q) {
      filtered = data.comitentes.slice();
    } else {
      filtered = data.comitentes.filter(function (c) {
        return normalize(c.nombre).indexOf(q) !== -1 || c.comitente.indexOf(q) !== -1;
      });
    }
    renderList();
  }

  function computeTipoBreakdown(comitente) {
    var totals = {};
    comitente.tenencias.forEach(function (t) {
      totals[t.tipo] = (totals[t.tipo] || 0) + t.importe;
    });
    var rows = Object.keys(totals).map(function (tipo) {
      return { tipo: tipo, importe: totals[tipo], pct: (totals[tipo] / comitente.total) * 100 };
    });
    rows.sort(function (a, b) { return b.importe - a.importe; });
    return rows;
  }

  // Beta ponderado de la cartera, calculado solo sobre el bloque de renta
  // variable (Acciones/Cedear), ponderado por importe. A pedido del usuario,
  // no se mezcla con renta fija (ON/Bonos/Letras no tienen beta de mercado
  // propio). Igual que en computeRendimientoEsperado, los tickers sin dato
  // de beta se excluyen y se prorratea sobre los que si tienen dato.
  function computeBetaPonderado(comitente) {
    var rvItems = comitente.tenencias.filter(function (t) { return !!TIPOS_RENTA_VARIABLE[t.tipo]; });
    var rvTotal = rvItems.reduce(function (s, t) { return s + t.importe; }, 0);
    if (rvTotal <= 0) return null;

    var sumPonderado = 0, importeConDato = 0;
    rvItems.forEach(function (t) {
      var m = metricasDeTicker(t.ticker);
      if (m && !m.sin_dato_usd && typeof m.beta === 'number') {
        sumPonderado += t.importe * m.beta;
        importeConDato += t.importe;
      }
    });
    if (importeConDato <= 0) return null;

    return {
      beta: sumPonderado / importeConDato,
      cobertura: (importeConDato / rvTotal) * 100
    };
  }

  // Genera las tarjetas de "Composición por tipo" (con beta ponderado) y
  // "Composición por sector" a partir de cualquier objeto con forma
  // { tenencias: [...], total }. Reutilizado tanto por renderDetail (un
  // comitente real) como por renderLab (la cartera hipotética del LAB).
  function renderComposicionYSectorHtml(comitenteLike) {
    var tipoRows = computeTipoBreakdown(comitenteLike);
    var betaInfo = computeBetaPonderado(comitenteLike);
    var sectorInfo = computeSectorBreakdown(comitenteLike);

    var stackedBarHtml = tipoRows.map(function (r) {
      return '<div class="cw-stacked-seg" style="width:' + r.pct.toFixed(2) + '%;background:' + tipoColor(r.tipo) + '" title="' + r.tipo + ' — ' + fmtPct(r.pct) + '"></div>';
    }).join('');

    var tipoRowsHtml = tipoRows.map(function (r) {
      return (
        '<div class="cw-type-row">' +
          '<div class="cw-type-name"><span class="cw-type-dot" style="background:' + tipoColor(r.tipo) + '"></span>' + r.tipo + '</div>' +
          '<div class="cw-type-amount">' + fmtMoney(r.importe) + '</div>' +
          '<div class="cw-type-pct">' + fmtPct(r.pct) + '</div>' +
        '</div>'
      );
    }).join('');

    var composicionHtml = (
      '<div class="cw-card">' +
        '<div class="cw-card-title">Composición por tipo de instrumento</div>' +
        '<div class="cw-stacked-bar">' + stackedBarHtml + '</div>' +
        tipoRowsHtml +
        (betaInfo ? (
          '<div class="cw-beta-summary">' +
            '<span class="cw-beta-label">Beta ponderado (renta variable)</span>' +
            '<span class="cw-beta-value">' + betaInfo.beta.toFixed(2) + '</span>' +
          '</div>' +
          (betaInfo.cobertura < 99.95
            ? '<div class="cw-metric-note">Calculado sobre el ' + fmtPct(betaInfo.cobertura) + ' del bloque de renta variable con beta disponible en Yahoo Finance (el resto no tiene beta publicado).</div>'
            : '<div class="cw-metric-note">Promedio ponderado por importe del beta de mercado (Yahoo Finance) de Acciones y Cedear. No incluye renta fija.</div>')
        ) : '') +
      '</div>'
    );

    var sectorCardHtml = '';
    if (sectorInfo) {
      var sectorBarHtml = sectorInfo.rows.map(function (r, idx) {
        return '<div class="cw-stacked-seg" style="width:' + r.pct.toFixed(2) + '%;background:' + sectorColor(r.sector, idx) + '" title="' + r.sector + ' — ' + fmtPct(r.pct) + '"></div>';
      }).join('');
      var sectorRowsHtml = sectorInfo.rows.map(function (r, idx) {
        return (
          '<div class="cw-type-row">' +
            '<div class="cw-type-name"><span class="cw-type-dot" style="background:' + sectorColor(r.sector, idx) + '"></span>' + r.sector + '</div>' +
            '<div class="cw-type-amount">' + fmtMoney(r.importe) + '</div>' +
            '<div class="cw-type-pct">' + fmtPct(r.pct) + '</div>' +
          '</div>'
        );
      }).join('');
      sectorCardHtml = (
        '<div class="cw-card">' +
          '<div class="cw-card-title">Composición por sector</div>' +
          '<div class="cw-stacked-bar">' + sectorBarHtml + '</div>' +
          sectorRowsHtml +
          '<div class="cw-metric-note">Sobre ON, Acciones y Cedear (' + fmtMoney(sectorInfo.base) + '). Para ON el sector es el de la empresa emisora. Se muestran los 4 sectores de mayor peso; el resto se agrupa en "Otros". No incluye Bonos, Letras, Futuros ni Opción de Futuro.</div>' +
        '</div>'
      );
    }

    return { composicionHtml: composicionHtml, sectorCardHtml: sectorCardHtml, tipoRows: tipoRows, betaInfo: betaInfo, sectorInfo: sectorInfo };
  }

  // Notas de diversificación con tono neutro/relajado (a pedido del
  // usuario, nada de alertas agresivas): se disparan si un ticker o un
  // sector concentran una porción grande de la cartera.
  function computeConcentracionNotas(comitenteLike, sectorInfo) {
    var notas = [];
    var total = comitenteLike.total;
    if (total > 0) {
      comitenteLike.tenencias.forEach(function (t) {
        var pct = (t.importe / total) * 100;
        if (pct >= 25) {
          notas.push(t.ticker + ' representa ' + fmtPct(pct) + ' de la cartera. No es necesariamente un problema, pero es una concentración a tener en el radar.');
        }
      });
      if (sectorInfo) {
        sectorInfo.rows.forEach(function (r) {
          if (r.sector !== 'Otros' && r.pct >= 50) {
            notas.push('El sector ' + r.sector + ' concentra ' + fmtPct(r.pct) + ' de la cartera. Podría valer la pena diversificar un poco más si buscás reducir ese riesgo puntual.');
          }
        });
      }
    }
    return notas;
  }

  function renderDetail(comitente) {
    resetWhatIfState(comitente.comitente);
    var composicion = renderComposicionYSectorHtml(comitente);

    var tableRowsHtml = comitente.tenencias.map(function (t) {
      var esRentaVariable = !!TIPOS_CON_METRICAS[t.tipo];
      var m = esRentaVariable ? metricasDeTicker(t.ticker) : null;
      var sma200Html, rendHtml, maxHtml;
      if (!esRentaVariable) {
        sma200Html = rendHtml = maxHtml = '<span class="cw-metric-na">—</span>';
      } else if (!m || m.sin_dato_usd) {
        var motivo = m && m.motivo ? m.motivo : 'Sin dato disponible en dólares.';
        sma200Html = rendHtml = maxHtml = '<span class="cw-metric-na" title="' + motivo.replace(/"/g, '&quot;') + '">s/d</span>';
      } else {
        sma200Html = fmtMetricPct(m.distancia_sma200_pct);
        rendHtml = fmtMetricPct(m.rendimiento_anual_pct);
        maxHtml = fmtMetricPct(m.distancia_maximo_pct);
      }
      return (
        '<tr>' +
          '<td class="cw-ticker">' + t.ticker + '</td>' +
          '<td><span class="cw-tipo-tag">' + t.tipo + '</span></td>' +
          '<td class="cw-num">' + fmtMoney(t.importe) + '</td>' +
          '<td class="cw-num">' + fmtPct(t.participacion_pct) + '</td>' +
          '<td class="cw-num">' + sma200Html + '</td>' +
          '<td class="cw-num">' + rendHtml + '</td>' +
          '<td class="cw-num">' + maxHtml + '</td>' +
        '</tr>'
      );
    }).join('');

    var escenarios = buildEscenariosMarkup(comitente, true);
    var fechaTexto = data && data.generado ? new Date(data.generado).toLocaleString('es-AR') : '';

    var html = (
      '<div class="cw-exec-header">' +
        '<div class="cw-exec-identity">' +
          '<div class="cw-exec-avatar">' + initials(comitente.nombre) + '</div>' +
          '<div>' +
            '<div class="cw-exec-name">' + comitente.nombre + '</div>' +
            '<div class="cw-exec-tag">Comitente N.º ' + comitente.comitente + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cw-exec-total">' +
          '<div class="cw-exec-total-label">Patrimonio total</div>' +
          '<div class="cw-exec-total-value">' + fmtMoney(comitente.total) + '</div>' +
          '<div class="cw-exec-total-date">Actualizado al ' + fechaTexto + '</div>' +
        '</div>' +
      '</div>' +

      composicion.composicionHtml +

      composicion.sectorCardHtml +

      (escenarios ? escenarios.html : '') +

      '<div class="cw-card">' +
        '<div class="cw-card-title-row">' +
          '<div class="cw-card-title" style="margin:0;">Detalle por instrumento</div>' +
          '<button type="button" class="cw-toggle-btn" id="cw-detalle-toggle">Mostrar detalle</button>' +
        '</div>' +
        '<div id="cw-detalle-tabla" style="display:none;">' +
          '<table class="cw-table">' +
            '<thead><tr>' +
              '<th>Ticker</th><th>Tipo</th><th class="cw-num">Importe</th><th class="cw-num">Participación %</th>' +
              '<th class="cw-num">Dist. media 200d</th><th class="cw-num">Rend. anual (10a)</th><th class="cw-num">Dist. máximo</th>' +
            '</tr></thead>' +
            '<tbody>' + tableRowsHtml + '</tbody>' +
          '</table>' +
          '<div class="cw-metric-note">Métricas de renta variable (Acciones y Cedear) en dólares, vía Yahoo Finance. "s/d" = sin dato disponible.</div>' +
        '</div>' +
      '</div>'
    );

    document.getElementById('cw-detail').innerHTML = html;

    if (escenarios) {
      wireScenarioCards(escenarios);
    }

    wireDetalleToggle();
  }

  function wireDetalleToggle() {
    var btn = document.getElementById('cw-detalle-toggle');
    var tabla = document.getElementById('cw-detalle-tabla');
    if (!btn || !tabla) return;
    btn.addEventListener('click', function () {
      var visible = tabla.style.display !== 'none';
      tabla.style.display = visible ? 'none' : 'block';
      btn.textContent = visible ? 'Mostrar detalle' : 'Ocultar detalle';
    });
  }

  function selectComitente(comitenteId) {
    var comitente = data.comitentes.find(function (c) { return c.comitente === comitenteId; });
    if (!comitente) return;
    activeComitente = comitenteId;
    closeLab();
    document.getElementById('cw-placeholder').style.display = 'none';
    document.getElementById('cw-detail').style.display = 'block';
    renderDetail(comitente);
    renderList();
  }

  // ===========================================================================
  // LAB: cartera hipotética armada desde cero (no parte de ningún comitente
  // real). Deja elegir cualquier ticker del universo ya presente en los
  // datos (ON, Bonos, Letras, Acciones, Cedear), en % de la cartera o en
  // capital USD, y muestra en vivo la misma composición/sector/beta/
  // escenarios que la vista de un comitente real. Permite guardar varias
  // carteras con nombre (localStorage) para comparar entre sí.
  // ===========================================================================

  function toggleLab() {
    labOpen = !labOpen;
    var btn = document.getElementById('cw-lab-btn');
    if (labOpen) {
      btn.textContent = 'Cerrar LAB';
      document.getElementById('cw-placeholder').style.display = 'none';
      document.getElementById('cw-detail').style.display = 'none';
      document.getElementById('cw-lab').style.display = 'block';
      renderLab();
    } else {
      btn.textContent = 'LAB';
      document.getElementById('cw-lab').style.display = 'none';
      if (activeComitente) {
        document.getElementById('cw-detail').style.display = 'block';
      } else {
        document.getElementById('cw-placeholder').style.display = 'flex';
      }
    }
  }

  function closeLab() {
    if (!labOpen) return;
    labOpen = false;
    var btn = document.getElementById('cw-lab-btn');
    if (btn) btn.textContent = 'LAB';
    document.getElementById('cw-lab').style.display = 'none';
  }

  function labComitenteVirtual() {
    var total = labState.items.reduce(function (s, it) { return s + it.monto; }, 0);
    var tenencias = labState.items.map(function (it) {
      return { ticker: it.ticker, tipo: it.tipo, importe: it.monto, participacion_pct: total > 0 ? (it.monto / total * 100) : 0 };
    });
    return { tenencias: tenencias, total: total };
  }

  function renderLab() {
    var wrap = document.getElementById('cw-lab');
    var virtual = labComitenteVirtual();
    var tieneItems = labState.items.length > 0;

    var composicion = tieneItems ? renderComposicionYSectorHtml(virtual) : null;
    var escenarios = tieneItems ? buildEscenariosMarkup(virtual, false) : null;
    var concentracionNotas = tieneItems ? computeConcentracionNotas(virtual, composicion.sectorInfo) : [];

    var tickersYaAgregados = {};
    labState.items.forEach(function (it) { tickersYaAgregados[it.ticker] = true; });

    var itemsTableHtml;
    if (labState.items.length) {
      var filasItems = labState.items.map(function (it) {
        var pct = virtual.total > 0 ? (it.monto / virtual.total * 100) : 0;
        return (
          '<tr>' +
            '<td class="cw-ticker">' + it.ticker + '</td>' +
            '<td><span class="cw-tipo-tag">' + it.tipo + '</span></td>' +
            '<td class="cw-num">' + fmtMoney(it.monto) + '</td>' +
            '<td class="cw-num">' + fmtPct(pct) + '</td>' +
            '<td class="cw-num"><button type="button" class="cw-lab-remove-btn" data-ticker="' + it.ticker + '">Quitar</button></td>' +
          '</tr>'
        );
      }).join('');
      itemsTableHtml = (
        '<table class="cw-table" style="margin-top:var(--cw-sp-4);">' +
          '<thead><tr><th>Ticker</th><th>Tipo</th><th class="cw-num">Monto</th><th class="cw-num">% cartera</th><th></th></tr></thead>' +
          '<tbody>' + filasItems + '</tbody>' +
        '</table>'
      );
    } else {
      itemsTableHtml = '<div class="cw-metric-note" style="margin-top:var(--cw-sp-3);">Todavía no agregaste ningún instrumento.</div>';
    }

    var capitalInputHtml = labState.modo === 'pct'
      ? ('<div class="cw-lab-capital-input"><label>Capital total de referencia (USD)</label><input type="number" id="cw-lab-capital-total" min="0" step="100" value="' + labState.capitalTotal + '"></div>')
      : '';

    var concentracionHtml = '';
    if (concentracionNotas.length) {
      concentracionHtml = (
        '<div class="cw-card cw-lab-alertas">' +
          '<div class="cw-card-title">Notas de diversificación</div>' +
          concentracionNotas.map(function (n) { return '<div class="cw-metric-note" style="margin-bottom:6px;">' + n + '</div>'; }).join('') +
        '</div>'
      );
    }

    var carterasGuardadas = leerCarterasGuardadas();
    var savedListHtml;
    if (carterasGuardadas.length) {
      var filasGuardadas = carterasGuardadas.map(function (c, idx) {
        var checked = labCompararSeleccion.indexOf(idx) !== -1 ? ' checked' : '';
        return (
          '<div class="cw-lab-saved-row">' +
            '<label class="cw-lab-saved-check"><input type="checkbox" class="cw-lab-comparar-check" data-idx="' + idx + '"' + checked + '> ' + c.nombre + '</label>' +
            '<span class="cw-lab-saved-meta">' + fmtMoney(c.capitalTotal) + ' · ' + new Date(c.fecha).toLocaleDateString('es-AR') + '</span>' +
            '<button type="button" class="cw-lab-cargar-btn cw-toggle-btn" data-idx="' + idx + '">Cargar</button>' +
            '<button type="button" class="cw-lab-eliminar-btn cw-lab-remove-btn" data-idx="' + idx + '">Eliminar</button>' +
          '</div>'
        );
      }).join('');
      savedListHtml = '<div class="cw-lab-saved-list">' + filasGuardadas + '</div>';
    } else {
      savedListHtml = '<div class="cw-metric-note" style="margin-top:var(--cw-sp-3);">Todavía no guardaste ninguna cartera.</div>';
    }

    var comparacionHtml = '';
    if (labCompararSeleccion.length) {
      var filasComparacion = labCompararSeleccion.map(function (idx) {
        var c = carterasGuardadas[idx];
        if (!c) return '';
        var total = c.items.reduce(function (s, it) { return s + it.monto; }, 0);
        var tenencias = c.items.map(function (it) { return { ticker: it.ticker, tipo: it.tipo, importe: it.monto, participacion_pct: total > 0 ? (it.monto / total * 100) : 0 }; });
        var virtualC = { tenencias: tenencias, total: total };
        var betaC = computeBetaPonderado(virtualC);
        var rendC = computeRendimientoEsperado(virtualC);
        var escCols = rendC
          ? rendC.escenarios.map(function (e) { return '<td class="cw-num">' + fmtSignedPct(e.total) + '</td>'; }).join('')
          : ESCENARIOS_RV.map(function () { return '<td class="cw-num">s/d</td>'; }).join('');
        return (
          '<tr>' +
            '<td class="cw-ticker">' + c.nombre + '</td>' +
            '<td class="cw-num">' + fmtMoney(total) + '</td>' +
            '<td class="cw-num">' + (betaC ? betaC.beta.toFixed(2) : 's/d') + '</td>' +
            escCols +
          '</tr>'
        );
      }).join('');
      comparacionHtml = (
        '<div style="margin-top:var(--cw-sp-4);overflow-x:auto;">' +
          '<table class="cw-table">' +
            '<thead><tr><th>Cartera</th><th class="cw-num">Capital</th><th class="cw-num">Beta</th>' +
              ESCENARIOS_RV.map(function (e) { return '<th class="cw-num">' + e.label + '</th>'; }).join('') +
            '</tr></thead>' +
            '<tbody>' + filasComparacion + '</tbody>' +
          '</table>' +
        '</div>'
      );
    }

    var html = (
      '<div class="cw-lab-header">' +
        '<div class="cw-lab-title">LAB — Cartera hipotética</div>' +
        '<div class="cw-lab-capital">Capital total: ' + fmtMoney(virtual.total) + '</div>' +
      '</div>' +

      '<div class="cw-card">' +
        '<div class="cw-card-title">Armar cartera</div>' +
        '<div class="cw-lab-modo-toggle">' +
          '<button type="button" class="cw-lab-modo-btn' + (labState.modo === 'pct' ? ' is-active' : '') + '" data-modo="pct">% de la cartera</button>' +
          '<button type="button" class="cw-lab-modo-btn' + (labState.modo === 'usd' ? ' is-active' : '') + '" data-modo="usd">Capital en USD</button>' +
        '</div>' +
        capitalInputHtml +
        '<div class="cw-lab-add-row">' +
          '<select id="cw-lab-ticker-select">' + buildTickerOptionsHtml(tickersYaAgregados) + '</select>' +
          '<input type="number" id="cw-lab-valor-input" min="0" step="0.1" placeholder="' + (labState.modo === 'pct' ? '% de la cartera' : 'Monto en USD') + '">' +
          '<button type="button" id="cw-lab-add-btn" class="cw-toggle-btn">+ Agregar</button>' +
        '</div>' +
        itemsTableHtml +
      '</div>' +

      concentracionHtml +

      (composicion ? (composicion.composicionHtml + composicion.sectorCardHtml) : '') +

      (escenarios ? escenarios.html : '<div class="cw-card"><div class="cw-metric-note">Agregá al menos un instrumento para ver rendimiento esperado, beta y composición.</div></div>') +

      '<div class="cw-card cw-lab-guardar">' +
        '<div class="cw-card-title">Guardar y comparar carteras</div>' +
        '<div class="cw-lab-guardar-row"><input type="text" id="cw-lab-nombre-input" placeholder="Nombre para esta cartera…"><button type="button" id="cw-lab-guardar-btn" class="cw-toggle-btn">Guardar</button></div>' +
        savedListHtml +
        comparacionHtml +
      '</div>'
    );

    wrap.innerHTML = html;
    wireLabControls();
    if (escenarios) wireScenarioCards(escenarios);
  }

  function wireLabControls() {
    var modoBtns = document.querySelectorAll('.cw-lab-modo-btn');
    modoBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var nuevoModo = btn.getAttribute('data-modo');
        if (nuevoModo === labState.modo) return;
        labState.modo = nuevoModo;
        renderLab();
      });
    });

    var capitalInput = document.getElementById('cw-lab-capital-total');
    if (capitalInput) {
      capitalInput.addEventListener('change', function () {
        var val = parseFloat(capitalInput.value);
        if (!isNaN(val) && val >= 0) labState.capitalTotal = val;
        renderLab();
      });
    }

    var addBtn = document.getElementById('cw-lab-add-btn');
    if (addBtn) {
      addBtn.addEventListener('click', function () {
        var select = document.getElementById('cw-lab-ticker-select');
        var valorInput = document.getElementById('cw-lab-valor-input');
        if (!select || !select.value) return;
        var parts = select.value.split('|');
        var ticker = parts[0], tipo = parts[1];
        var valor = parseFloat(valorInput.value);
        if (isNaN(valor) || valor <= 0) return;
        var monto = labState.modo === 'pct' ? (valor / 100 * labState.capitalTotal) : valor;
        labState.items.push({ ticker: ticker, tipo: tipo, monto: monto });
        renderLab();
      });
    }

    var removeBtns = document.querySelectorAll('.cw-lab-remove-btn[data-ticker]');
    removeBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var ticker = btn.getAttribute('data-ticker');
        labState.items = labState.items.filter(function (it) { return it.ticker !== ticker; });
        renderLab();
      });
    });

    var guardarBtn = document.getElementById('cw-lab-guardar-btn');
    if (guardarBtn) {
      guardarBtn.addEventListener('click', function () {
        var nombreInput = document.getElementById('cw-lab-nombre-input');
        var nombre = nombreInput && nombreInput.value.trim();
        if (!nombre || !labState.items.length) return;
        var carteras = leerCarterasGuardadas();
        carteras.push({ nombre: nombre, fecha: new Date().toISOString(), capitalTotal: labState.capitalTotal, modo: labState.modo, items: labState.items.slice() });
        guardarCarterasEnStorage(carteras);
        renderLab();
      });
    }

    var cargarBtns = document.querySelectorAll('.cw-lab-cargar-btn');
    cargarBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        var carteras = leerCarterasGuardadas();
        var cartera = carteras[idx];
        if (!cartera) return;
        labState.items = cartera.items.slice();
        labState.capitalTotal = cartera.capitalTotal;
        labState.modo = cartera.modo || 'pct';
        renderLab();
      });
    });

    var eliminarBtns = document.querySelectorAll('.cw-lab-eliminar-btn');
    eliminarBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        var carteras = leerCarterasGuardadas();
        carteras.splice(idx, 1);
        guardarCarterasEnStorage(carteras);
        var pos = labCompararSeleccion.indexOf(idx);
        if (pos !== -1) labCompararSeleccion.splice(pos, 1);
        renderLab();
      });
    });

    var compararCheckboxes = document.querySelectorAll('.cw-lab-comparar-check');
    compararCheckboxes.forEach(function (cb) {
      cb.addEventListener('change', function () {
        var idx = parseInt(cb.getAttribute('data-idx'), 10);
        var pos = labCompararSeleccion.indexOf(idx);
        if (cb.checked && pos === -1) labCompararSeleccion.push(idx);
        if (!cb.checked && pos !== -1) labCompararSeleccion.splice(pos, 1);
        renderLab();
      });
    });
  }

  function renderPlaceholderStats() {
    var wrap = document.getElementById('cw-placeholder-stats');
    wrap.innerHTML =
      '<div class="cw-stat-chip"><div class="cw-stat-value">' + data.cantidad_comitentes + '</div><div class="cw-stat-label">Comitentes</div></div>' +
      '<div class="cw-stat-chip"><div class="cw-stat-value">' + fmtMoney(data.aum_total) + '</div><div class="cw-stat-label">AUM total</div></div>';
  }

  Promise.all([
    fetch(DATA_URL).then(function (r) { return r.json(); }),
    fetch(METRICAS_URL).then(function (r) { return r.json(); }).catch(function () { return null; }),
    fetch(RENTA_FIJA_URL).then(function (r) { return r.json(); }).catch(function () { return null; })
  ])
    .then(function (results) {
      data = results[0];
      metricas = results[1];
      rentaFija = results[2];
      filtered = data.comitentes.slice();
      buildTickerUniverse();
      renderList();
      renderPlaceholderStats();
      var fecha = new Date(data.generado);
      document.getElementById('cw-header-fecha').textContent = 'Datos actualizados al ' + fecha.toLocaleString('es-AR');
    })
    .catch(function (err) {
      document.getElementById('cw-list').innerHTML = '<div class="cw-list-empty">No se pudieron cargar los datos.</div>';
      console.error(err);
    });

  document.getElementById('cw-search').addEventListener('input', function (e) {
    applyFilter(e.target.value);
  });

  document.getElementById('cw-lab-btn').addEventListener('click', toggleLab);
})();
</script>

</body>
</html>
