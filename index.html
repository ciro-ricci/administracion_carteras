<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración de Carteras</title>
<style>
  /* =====================================================================
     cw- : Design system de la seccion "Cartera por comitente"
     Paleta, tipografia y espaciados aislados bajo .cw-app para poder
     repintar esta seccion sin afectar al resto del sitio si se agregan
     mas pestañas mas adelante.
     ===================================================================== */
  .cw-app {
    /* --- Superficies --- */
    --cw-bg: #111827;
    --cw-bg-sidebar: #0f172a;
    --cw-panel: #1e293b;
    --cw-panel-2: #243244;
    --cw-border: rgba(255, 255, 255, 0.08);
    --cw-border-strong: rgba(255, 255, 255, 0.14);

    /* --- Texto --- */
    --cw-text: #f8fafc;
    --cw-text-secondary: #cbd5e1;
    --cw-text-tertiary: #94a3b8;

    /* --- Acento y semaforo --- */
    --cw-primary: #3b82f6;
    --cw-primary-soft: rgba(59, 130, 246, 0.14);
    --cw-green: #22c55e;
    --cw-green-soft: rgba(34, 197, 94, 0.14);
    --cw-red: #ef4444;
    --cw-red-soft: rgba(239, 68, 68, 0.14);

    /* --- Radios y sombras --- */
    --cw-radius-sm: 10px;
    --cw-radius-md: 14px;
    --cw-radius-lg: 18px;
    --cw-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.28);
    --cw-shadow-md: 0 10px 30px rgba(0, 0, 0, 0.32);

    /* --- Escala tipografica --- */
    --cw-fs-display: 36px;
    --cw-fs-h1: 24px;
    --cw-fs-kpi: 30px;
    --cw-fs-section: 12px;
    --cw-fs-body: 14px;
    --cw-fs-secondary: 13px;
    --cw-fs-label: 11px;

    /* --- Escala de espaciado --- */
    --cw-sp-1: 4px;
    --cw-sp-2: 8px;
    --cw-sp-3: 12px;
    --cw-sp-4: 16px;
    --cw-sp-5: 24px;
    --cw-sp-6: 32px;
    --cw-sp-7: 40px;

    /* Colores por tipo de instrumento */
    --cw-c-on: #3b82f6;
    --cw-c-bonos: #60a5fa;
    --cw-c-cedear: #38bdf8;
    --cw-c-acciones: #f59e0b;
    --cw-c-letras: #22c55e;
    --cw-c-futuros: #a78bfa;
    --cw-c-opcion: #fb923c;
    --cw-c-default: #64748b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--cw-bg);
    color: var(--cw-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: var(--cw-fs-body);
  }

  .cw-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  a, button { font-family: inherit; }

  :focus-visible {
    outline: 2px solid var(--cw-primary);
    outline-offset: 2px;
  }

  /* ---------- Top bar ---------- */
  .cw-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--cw-sp-4) var(--cw-sp-6);
    background: var(--cw-bg-sidebar);
    border-bottom: 1px solid var(--cw-border);
    flex-shrink: 0;
  }
  .cw-header h1 {
    font-size: 15px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--cw-text);
  }
  .cw-header .cw-header-sub {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Layout principal ---------- */
  .cw-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---------- Sidebar ---------- */
  .cw-sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--cw-bg-sidebar);
    border-right: 1px solid var(--cw-border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cw-search-wrap {
    padding: var(--cw-sp-4);
    border-bottom: 1px solid var(--cw-border);
    flex-shrink: 0;
  }
  .cw-search-input-wrap {
    position: relative;
  }
  .cw-search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cw-text-tertiary);
    pointer-events: none;
  }
  .cw-search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 32px;
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-sm);
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text);
    background: rgba(255, 255, 255, 0.03);
    outline: none;
    transition: border-color .2s ease, background .2s ease;
  }
  .cw-search-wrap input::placeholder {
    color: var(--cw-text-tertiary);
  }
  .cw-search-wrap input:focus {
    border-color: var(--cw-primary);
    background: rgba(255, 255, 255, 0.05);
  }
  .cw-search-count {
    margin-top: var(--cw-sp-2);
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .cw-list {
    flex: 1;
    overflow-y: auto;
    padding: var(--cw-sp-2) var(--cw-sp-2);
  }
  .cw-list-item {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-3);
    padding: var(--cw-sp-3);
    margin-bottom: 2px;
    border-radius: var(--cw-radius-sm);
    cursor: pointer;
    transition: background .15s ease;
  }
  .cw-list-item:hover {
    background: rgba(255, 255, 255, 0.04);
  }
  .cw-list-item.is-active {
    background: var(--cw-primary-soft);
  }
  .cw-list-item.is-active .cw-item-name {
    color: var(--cw-text);
  }
  .cw-avatar {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--cw-panel-2);
    color: var(--cw-text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .01em;
  }
  .cw-list-item.is-active .cw-avatar {
    background: var(--cw-primary);
    color: #fff;
  }
  .cw-item-body {
    min-width: 0;
    flex: 1;
  }
  .cw-list-item .cw-item-name {
    font-size: var(--cw-fs-secondary);
    font-weight: 600;
    color: var(--cw-text-secondary);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cw-list-item .cw-item-meta {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .cw-list-empty {
    padding: var(--cw-sp-6) var(--cw-sp-4);
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text-tertiary);
    text-align: center;
  }

  /* ---------- Panel derecho ---------- */
  .cw-main {
    flex: 1;
    overflow-y: auto;
    padding: var(--cw-sp-6) var(--cw-sp-7);
    min-height: 0;
  }

  .cw-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--cw-text-tertiary);
    gap: var(--cw-sp-2);
  }
  .cw-placeholder .cw-placeholder-title {
    font-size: var(--cw-fs-h1);
    font-weight: 700;
    color: var(--cw-text);
  }
  .cw-placeholder-stats {
    margin-top: var(--cw-sp-5);
    display: flex;
    gap: var(--cw-sp-3);
  }
  .cw-stat-chip {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-md);
    padding: var(--cw-sp-3) var(--cw-sp-5);
    box-shadow: var(--cw-shadow-sm);
  }
  .cw-stat-chip .cw-stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--cw-text);
    font-variant-numeric: tabular-nums;
  }
  .cw-stat-chip .cw-stat-label {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* ---------- Encabezado ejecutivo del comitente ---------- */
  .cw-exec-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--cw-sp-6);
    padding-bottom: var(--cw-sp-5);
    margin-bottom: var(--cw-sp-5);
    border-bottom: 1px solid var(--cw-border);
    flex-wrap: wrap;
  }
  .cw-exec-identity {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-4);
    min-width: 0;
  }
  .cw-exec-avatar {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(160deg, var(--cw-primary), #1d4ed8);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
  }
  .cw-exec-name {
    font-size: var(--cw-fs-h1);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--cw-text);
    line-height: 1.25;
  }
  .cw-exec-tag {
    display: inline-flex;
    align-items: center;
    margin-top: var(--cw-sp-1);
    font-size: var(--cw-fs-label);
    font-weight: 600;
    color: var(--cw-text-tertiary);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--cw-border);
    padding: 2px 8px;
    border-radius: 20px;
    font-variant-numeric: tabular-nums;
  }
  .cw-exec-total {
    text-align: right;
    flex-shrink: 0;
  }
  .cw-exec-total .cw-exec-total-label {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 600;
  }
  .cw-exec-total .cw-exec-total-value {
    font-size: var(--cw-fs-display);
    font-weight: 800;
    color: var(--cw-text);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    line-height: 1.15;
  }
  .cw-exec-total .cw-exec-total-date {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-1);
  }

  /* ---------- Cards ---------- */
  .cw-card {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-lg);
    box-shadow: var(--cw-shadow-sm);
    padding: var(--cw-sp-5);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-card-title {
    font-size: var(--cw-fs-section);
    font-weight: 700;
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 0 0 var(--cw-sp-4) 0;
  }

  /* ---------- Composicion: barra apilada + leyenda ---------- */
  .cw-stacked-bar {
    display: flex;
    width: 100%;
    height: 10px;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.04);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-stacked-seg {
    height: 100%;
    transition: opacity .15s ease;
  }
  .cw-stacked-seg:hover {
    opacity: 0.82;
  }

  .cw-type-row {
    display: grid;
    grid-template-columns: 1fr 130px 64px;
    align-items: center;
    gap: var(--cw-sp-3);
    padding: var(--cw-sp-2) 0;
    font-size: var(--cw-fs-secondary);
    border-top: 1px solid var(--cw-border);
  }
  .cw-type-row:first-of-type {
    border-top: none;
  }
  .cw-type-row .cw-type-name {
    display: flex;
    align-items: center;
    gap: var(--cw-sp-2);
    font-weight: 600;
    color: var(--cw-text-secondary);
  }
  .cw-type-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cw-type-amount {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text);
    font-weight: 600;
  }
  .cw-type-pct {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text-tertiary);
  }

  /* ---------- Tabla de tenencias ---------- */
  .cw-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--cw-fs-secondary);
  }
  .cw-table thead th {
    text-align: left;
    font-size: var(--cw-fs-label);
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--cw-text-tertiary);
    font-weight: 700;
    padding: 0 var(--cw-sp-3) var(--cw-sp-3) var(--cw-sp-3);
    border-bottom: 1px solid var(--cw-border);
  }
  .cw-table thead th.cw-num {
    text-align: right;
  }
  .cw-table tbody td {
    padding: 11px var(--cw-sp-3);
    border-bottom: 1px solid var(--cw-border);
    color: var(--cw-text-secondary);
  }
  .cw-table tbody tr:last-child td {
    border-bottom: none;
  }
  .cw-table tbody tr {
    transition: background .12s ease;
  }
  .cw-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.025);
  }
  .cw-table td.cw-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .cw-ticker {
    font-weight: 700;
    color: var(--cw-text);
  }
  .cw-tipo-tag {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--cw-text-tertiary);
  }
  .cw-metric-pos { color: var(--cw-green); }
  .cw-metric-neg { color: var(--cw-red); }
  .cw-metric-na {
    color: var(--cw-text-tertiary);
    font-style: italic;
    font-size: 12px;
  }
  .cw-metric-note {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-3);
    line-height: 1.5;
  }

  /* ---------- Tarjetas KPI de escenario ---------- */
  .cw-scenario-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--cw-sp-4);
    margin-bottom: var(--cw-sp-5);
  }
  .cw-scenario-card {
    background: var(--cw-panel);
    border: 1px solid var(--cw-border);
    border-radius: var(--cw-radius-lg);
    box-shadow: var(--cw-shadow-sm);
    padding: var(--cw-sp-5);
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .cw-scenario-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--cw-shadow-md);
    border-color: var(--cw-border-strong);
  }
  .cw-scenario-card.is-active {
    border-color: var(--cw-primary);
  }
  .cw-scenario-title {
    font-size: var(--cw-fs-label);
    font-weight: 700;
    color: var(--cw-text-tertiary);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: var(--cw-sp-3);
  }
  .cw-scenario-total {
    font-size: var(--cw-fs-kpi);
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    color: var(--cw-text);
  }
  .cw-scenario-desc {
    font-size: var(--cw-fs-secondary);
    color: var(--cw-text-secondary);
    margin-top: var(--cw-sp-2);
    line-height: 1.45;
  }
  .cw-scenario-action {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: var(--cw-fs-label);
    font-weight: 600;
    color: var(--cw-primary);
    margin-top: var(--cw-sp-4);
    padding-top: var(--cw-sp-3);
    border-top: 1px solid var(--cw-border);
  }
  .cw-scenario-coverage {
    font-size: var(--cw-fs-label);
    color: var(--cw-text-tertiary);
    margin-top: var(--cw-sp-3);
    font-style: italic;
    line-height: 1.5;
  }
  .cw-scenario-detail {
    background: var(--cw-panel-2);
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.14); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .cw-sidebar { width: 260px; }
    .cw-scenario-grid { grid-template-columns: repeat(2, 1fr); }
    .cw-main { padding: var(--cw-sp-5); }
  }

  @media (max-width: 720px) {
    .cw-body { flex-direction: column; }
    .cw-sidebar {
      width: 100%;
      max-height: 42vh;
      border-right: none;
      border-bottom: 1px solid var(--cw-border);
    }
    .cw-scenario-grid { grid-template-columns: 1fr; }
    .cw-exec-header { flex-direction: column; align-items: flex-start; }
    .cw-exec-total { text-align: left; }
    .cw-main { padding: var(--cw-sp-4); }
    .cw-header { padding: var(--cw-sp-3) var(--cw-sp-4); }
  }
</style>
</head>
<body>

<div class="cw-app">
  <header class="cw-header">
    <h1>Administración de Carteras</h1>
    <span class="cw-header-sub" id="cw-header-fecha"></span>
  </header>

  <div class="cw-body">
    <aside class="cw-sidebar">
      <div class="cw-search-wrap">
        <div class="cw-search-input-wrap">
          <svg class="cw-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="cw-search" placeholder="Buscar por nombre o número…" autocomplete="off">
        </div>
        <div class="cw-search-count" id="cw-search-count"></div>
      </div>
      <div class="cw-list" id="cw-list"></div>
    </aside>

    <main class="cw-main" id="cw-main">
      <div class="cw-placeholder" id="cw-placeholder">
        <div class="cw-placeholder-title">Seleccioná un comitente</div>
        <div>Elegí un comitente de la lista para ver el detalle de su cartera.</div>
        <div class="cw-placeholder-stats" id="cw-placeholder-stats"></div>
      </div>
      <div id="cw-detail" style="display:none;"></div>
    </main>
  </div>
</div>

<script>
(function () {
  var DATA_URL = 'data/tenencias.json';
  var METRICAS_URL = 'data/metricas.json';
  var RENTA_FIJA_URL = 'data/renta_fija.json';
  var data = null;
  var metricas = null;
  var rentaFija = null;
  var filtered = [];
  var activeComitente = null;
  var TIPOS_CON_METRICAS = { 'Acciones': true, 'Cedear': true };
  var TIPOS_RENTA_FIJA = { 'ON': true, 'Bonos': true, 'Letras': true };
  var TIPOS_RENTA_VARIABLE = { 'Acciones': true, 'Cedear': true };

  var ESCENARIOS_RV = [
    {
      key: 'sma200',
      label: 'Reversión a media de 200 ruedas',
      descripcion: 'Asume que cada acción/cedear converge a su precio promedio de las últimas 200 ruedas.',
      retorno: function (m) {
        if (!m || m.sma200_usd === null || m.sma200_usd === undefined || !m.precio_actual_usd) return null;
        return (m.sma200_usd - m.precio_actual_usd) / m.precio_actual_usd * 100;
      }
    },
    {
      key: 'cagr',
      label: 'Continuidad del rendimiento anual (CAGR 10a)',
      descripcion: 'Asume que cada acción/cedear mantiene su tasa de crecimiento anual promedio histórica.',
      retorno: function (m) {
        if (!m || m.rendimiento_anual_pct === null || m.rendimiento_anual_pct === undefined) return null;
        return m.rendimiento_anual_pct;
      }
    },
    {
      key: 'maximo',
      label: 'Recuperación al máximo histórico',
      descripcion: 'Asume que cada acción/cedear recupera su máximo precio histórico dentro de la ventana de datos.',
      retorno: function (m) {
        if (!m || m.maximo_periodo_usd === null || m.maximo_periodo_usd === undefined || !m.precio_actual_usd) return null;
        return (m.maximo_periodo_usd - m.precio_actual_usd) / m.precio_actual_usd * 100;
      }
    }
  ];

  var TYPE_COLOR = {
    'ON': 'var(--cw-c-on)',
    'Bonos': 'var(--cw-c-bonos)',
    'Cedear': 'var(--cw-c-cedear)',
    'Acciones': 'var(--cw-c-acciones)',
    'Letras': 'var(--cw-c-letras)',
    'Futuros': 'var(--cw-c-futuros)',
    'Opción de Futuro': 'var(--cw-c-opcion)'
  };

  function tipoColor(tipo) {
    return TYPE_COLOR[tipo] || 'var(--cw-c-default)';
  }

  function initials(nombre) {
    if (!nombre) return '?';
    var partes = nombre.trim().split(/\s+/).filter(Boolean);
    if (!partes.length) return '?';
    if (partes.length === 1) return partes[0].substring(0, 2).toUpperCase();
    return (partes[0].charAt(0) + partes[1].charAt(0)).toUpperCase();
  }

  function normalize(s) {
    return (s || '')
      .toString()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase();
  }

  function fmtMoney(n) {
    return '$ ' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPct(n) {
    return Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
  }

  function fmtMetricPct(n) {
    if (n === null || n === undefined) return '<span class="cw-metric-na">s/d</span>';
    var cls = n > 0 ? 'cw-metric-pos' : (n < 0 ? 'cw-metric-neg' : '');
    var sign = n > 0 ? '+' : '';
    return '<span class="' + cls + '">' + sign + fmtPct(n) + '</span>';
  }

  function metricasDeTicker(ticker) {
    if (!metricas || !metricas.tickers) return null;
    return metricas.tickers[ticker] || null;
  }

  function rentaFijaDeTicker(ticker) {
    if (!rentaFija || !rentaFija.tickers) return null;
    return rentaFija.tickers[ticker] || null;
  }

  function fmtSignedPct(n) {
    var sign = n > 0 ? '+' : '';
    return sign + fmtPct(n);
  }

  // Calcula, para un comitente, el rendimiento esperado de su cartera bajo
  // los 3 escenarios de renta variable, combinado con la TIR de su renta
  // fija (ON, Bonos, Letras). Excluye por completo Futuros y Opción de
  // Futuro (no se consideran en esta estimación, a pedido del usuario).
  function computeRendimientoEsperado(comitente) {
    var rfItems = comitente.tenencias.filter(function (t) { return !!TIPOS_RENTA_FIJA[t.tipo]; });
    var rvItems = comitente.tenencias.filter(function (t) { return !!TIPOS_RENTA_VARIABLE[t.tipo]; });

    var rfTotal = rfItems.reduce(function (s, t) { return s + t.importe; }, 0);
    var rvTotal = rvItems.reduce(function (s, t) { return s + t.importe; }, 0);
    var baseTotal = rfTotal + rvTotal;
    if (baseTotal <= 0) return null;

    var pesoRF = rfTotal / baseTotal;
    var pesoRV = rvTotal / baseTotal;

    var rfSumPonderado = 0, rfImporteConDato = 0;
    rfItems.forEach(function (t) {
      var rf = rentaFijaDeTicker(t.ticker);
      if (rf && typeof rf.tir_usd_pct === 'number') {
        rfSumPonderado += t.importe * rf.tir_usd_pct;
        rfImporteConDato += t.importe;
      }
    });
    var rfRendimiento = rfImporteConDato > 0 ? rfSumPonderado / rfImporteConDato : null;
    var rfCobertura = rfTotal > 0 ? (rfImporteConDato / rfTotal) * 100 : null;

    var escenarios = ESCENARIOS_RV.map(function (esc) {
      var sumPonderado = 0, importeConDato = 0;
      var filas = [];

      rfItems.forEach(function (t) {
        var rf = rentaFijaDeTicker(t.ticker);
        var rendimiento = (rf && typeof rf.tir_usd_pct === 'number') ? rf.tir_usd_pct : null;
        filas.push({ ticker: t.ticker, tipo: t.tipo, rendimiento: rendimiento, pctTotal: t.participacion_pct, importe: t.importe });
      });

      rvItems.forEach(function (t) {
        var m = metricasDeTicker(t.ticker);
        var retorno = (m && !m.sin_dato_usd) ? esc.retorno(m) : null;
        if (retorno !== null && retorno !== undefined) {
          sumPonderado += t.importe * retorno;
          importeConDato += t.importe;
        }
        filas.push({ ticker: t.ticker, tipo: t.tipo, rendimiento: (retorno !== null && retorno !== undefined) ? retorno : null, pctTotal: t.participacion_pct, importe: t.importe });
      });

      filas.sort(function (a, b) { return b.importe - a.importe; });

      var rvRendimiento = importeConDato > 0 ? sumPonderado / importeConDato : null;
      var rvCobertura = rvTotal > 0 ? (importeConDato / rvTotal) * 100 : null;

      var total = pesoRF * (rfRendimiento || 0) + pesoRV * (rvRendimiento || 0);

      return {
        label: esc.label,
        descripcion: esc.descripcion,
        rfRendimiento: rfRendimiento,
        rfCobertura: rfCobertura,
        rvRendimiento: rvRendimiento,
        rvCobertura: rvCobertura,
        total: total,
        filas: filas
      };
    });

    return {
      pesoRF: pesoRF,
      pesoRV: pesoRV,
      rfTotal: rfTotal,
      rvTotal: rvTotal,
      escenarios: escenarios
    };
  }

  function renderFilaDetalle(f) {
    var rendHtml = (f.rendimiento !== null && f.rendimiento !== undefined)
      ? fmtMetricPct(f.rendimiento)
      : '<span class="cw-metric-na">s/d</span>';
    return (
      '<tr>' +
        '<td class="cw-ticker">' + f.ticker + '</td>' +
        '<td><span class="cw-tipo-tag">' + f.tipo + '</span></td>' +
        '<td class="cw-num">' + rendHtml + '</td>' +
        '<td class="cw-num">' + fmtPct(f.pctTotal) + '</td>' +
      '</tr>'
    );
  }

  // Construye el markup de las 3 tarjetas KPI de escenario (con click para
  // desplegar, debajo de la grilla, el detalle por instrumento de ESE
  // escenario) y devuelve tambien la lista de esos detalles para poder
  // insertarlos dinamicamente al hacer click (ver wireScenarioCards).
  function buildEscenariosMarkup(comitente) {
    var r = computeRendimientoEsperado(comitente);
    if (!r) return null;

    var cardsHtml = r.escenarios.map(function (esc, idx) {
      var totalCls = esc.total > 0 ? 'cw-metric-pos' : (esc.total < 0 ? 'cw-metric-neg' : '');
      return (
        '<div class="cw-scenario-card" data-esc-idx="' + idx + '">' +
          '<div class="cw-scenario-title">' + esc.label + '</div>' +
          '<div class="cw-scenario-total ' + totalCls + '">' + fmtSignedPct(esc.total) + '</div>' +
          '<div class="cw-scenario-desc">' + esc.descripcion + '</div>' +
          '<div class="cw-scenario-action">Ver rendimientos por instrumento <span>&rarr;</span></div>' +
        '</div>'
      );
    }).join('');

    var detallesHtml = r.escenarios.map(function (esc) {
      var filasHtml = esc.filas.map(renderFilaDetalle).join('');
      var coberturaNotas = [];
      if (esc.rfCobertura !== null && esc.rfCobertura < 99.95) {
        coberturaNotas.push('Renta fija con TIR disponible: ' + fmtPct(esc.rfCobertura) + ' del bloque.');
      }
      if (esc.rvCobertura !== null && esc.rvCobertura < 99.95) {
        coberturaNotas.push('Renta variable con dato para este escenario: ' + fmtPct(esc.rvCobertura) + ' del bloque.');
      }
      var coberturaHtml = coberturaNotas.length
        ? '<div class="cw-scenario-coverage">' + coberturaNotas.join(' ') + '</div>'
        : '';
      return (
        '<div class="cw-card cw-scenario-detail">' +
          '<div class="cw-card-title">Rendimientos considerados — ' + esc.label + '</div>' +
          '<table class="cw-table">' +
            '<thead><tr>' +
              '<th>Ticker</th><th>Tipo</th><th class="cw-num">Rendimiento usado</th><th class="cw-num">% s/ total cartera</th>' +
            '</tr></thead>' +
            '<tbody>' + filasHtml + '</tbody>' +
          '</table>' +
          coberturaHtml +
        '</div>'
      );
    });

    var html = (
      '<div class="cw-card">' +
        '<div class="cw-card-title">Rendimiento esperado por escenario</div>' +
        '<div class="cw-scenario-grid">' + cardsHtml + '</div>' +
        '<div class="cw-metric-note">Renta fija (ON, Bonos, Letras) a su TIR en dólares (planilla de seguimiento, o 6% fijo cuando no hay dato de mercado). Renta variable (Acciones, Cedear) según el escenario. No incluye Futuros ni Opción de Futuro.</div>' +
      '</div>' +
      '<div id="cw-escenario-detalle" style="display:none;"></div>'
    );

    return { html: html, detalles: detallesHtml };
  }

  function wireScenarioCards(detalles) {
    var cards = document.querySelectorAll('.cw-scenario-card');
    var contenedor = document.getElementById('cw-escenario-detalle');
    if (!cards.length || !contenedor) return;
    var activo = null;
    cards.forEach(function (card) {
      card.addEventListener('click', function () {
        var idx = parseInt(card.getAttribute('data-esc-idx'), 10);
        if (activo === idx) {
          contenedor.style.display = 'none';
          contenedor.innerHTML = '';
          card.classList.remove('is-active');
          activo = null;
          return;
        }
        cards.forEach(function (c) { c.classList.remove('is-active'); });
        card.classList.add('is-active');
        contenedor.innerHTML = detalles[idx];
        contenedor.style.display = 'block';
        activo = idx;
      });
    });
  }

  function el(tag, attrs, html) {
    var e = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
    }
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function renderList() {
    var listEl = document.getElementById('cw-list');
    var countEl = document.getElementById('cw-search-count');
    listEl.innerHTML = '';

    if (!filtered.length) {
      listEl.appendChild(el('div', { class: 'cw-list-empty' }, 'No se encontraron comitentes.'));
      countEl.textContent = '0 comitentes';
      return;
    }

    countEl.textContent = filtered.length + (filtered.length === 1 ? ' comitente' : ' comitentes');

    filtered.forEach(function (c) {
      var item = el('div', { class: 'cw-list-item' + (c.comitente === activeComitente ? ' is-active' : '') });
      item.appendChild(el('div', { class: 'cw-avatar' }, initials(c.nombre)));
      var body = el('div', { class: 'cw-item-body' });
      body.appendChild(el('div', { class: 'cw-item-name' }, c.nombre));
      body.appendChild(el('div', { class: 'cw-item-meta' }, 'N.º ' + c.comitente + ' · ' + fmtMoney(c.total)));
      item.appendChild(body);
      item.addEventListener('click', function () { selectComitente(c.comitente); });
      listEl.appendChild(item);
    });
  }

  function applyFilter(query) {
    var q = normalize(query.trim());
    if (!q) {
      filtered = data.comitentes.slice();
    } else {
      filtered = data.comitentes.filter(function (c) {
        return normalize(c.nombre).indexOf(q) !== -1 || c.comitente.indexOf(q) !== -1;
      });
    }
    renderList();
  }

  function computeTipoBreakdown(comitente) {
    var totals = {};
    comitente.tenencias.forEach(function (t) {
      totals[t.tipo] = (totals[t.tipo] || 0) + t.importe;
    });
    var rows = Object.keys(totals).map(function (tipo) {
      return { tipo: tipo, importe: totals[tipo], pct: (totals[tipo] / comitente.total) * 100 };
    });
    rows.sort(function (a, b) { return b.importe - a.importe; });
    return rows;
  }

  function renderDetail(comitente) {
    var tipoRows = computeTipoBreakdown(comitente);

    var stackedBarHtml = tipoRows.map(function (r) {
      return '<div class="cw-stacked-seg" style="width:' + r.pct.toFixed(2) + '%;background:' + tipoColor(r.tipo) + '" title="' + r.tipo + ' — ' + fmtPct(r.pct) + '"></div>';
    }).join('');

    var tipoRowsHtml = tipoRows.map(function (r) {
      return (
        '<div class="cw-type-row">' +
          '<div class="cw-type-name"><span class="cw-type-dot" style="background:' + tipoColor(r.tipo) + '"></span>' + r.tipo + '</div>' +
          '<div class="cw-type-amount">' + fmtMoney(r.importe) + '</div>' +
          '<div class="cw-type-pct">' + fmtPct(r.pct) + '</div>' +
        '</div>'
      );
    }).join('');

    var tableRowsHtml = comitente.tenencias.map(function (t) {
      var esRentaVariable = !!TIPOS_CON_METRICAS[t.tipo];
      var m = esRentaVariable ? metricasDeTicker(t.ticker) : null;
      var sma200Html, rendHtml, maxHtml;
      if (!esRentaVariable) {
        sma200Html = rendHtml = maxHtml = '<span class="cw-metric-na">—</span>';
      } else if (!m || m.sin_dato_usd) {
        var motivo = m && m.motivo ? m.motivo : 'Sin dato disponible en dólares.';
        sma200Html = rendHtml = maxHtml = '<span class="cw-metric-na" title="' + motivo.replace(/"/g, '&quot;') + '">s/d</span>';
      } else {
        sma200Html = fmtMetricPct(m.distancia_sma200_pct);
        rendHtml = fmtMetricPct(m.rendimiento_anual_pct);
        maxHtml = fmtMetricPct(m.distancia_maximo_pct);
      }
      return (
        '<tr>' +
          '<td class="cw-ticker">' + t.ticker + '</td>' +
          '<td><span class="cw-tipo-tag">' + t.tipo + '</span></td>' +
          '<td class="cw-num">' + fmtMoney(t.importe) + '</td>' +
          '<td class="cw-num">' + fmtPct(t.participacion_pct) + '</td>' +
          '<td class="cw-num">' + sma200Html + '</td>' +
          '<td class="cw-num">' + rendHtml + '</td>' +
          '<td class="cw-num">' + maxHtml + '</td>' +
        '</tr>'
      );
    }).join('');

    var escenarios = buildEscenariosMarkup(comitente);
    var fechaTexto = data && data.generado ? new Date(data.generado).toLocaleString('es-AR') : '';

    var html = (
      '<div class="cw-exec-header">' +
        '<div class="cw-exec-identity">' +
          '<div class="cw-exec-avatar">' + initials(comitente.nombre) + '</div>' +
          '<div>' +
            '<div class="cw-exec-name">' + comitente.nombre + '</div>' +
            '<div class="cw-exec-tag">Comitente N.º ' + comitente.comitente + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cw-exec-total">' +
          '<div class="cw-exec-total-label">Patrimonio total</div>' +
          '<div class="cw-exec-total-value">' + fmtMoney(comitente.total) + '</div>' +
          '<div class="cw-exec-total-date">Actualizado al ' + fechaTexto + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="cw-card">' +
        '<div class="cw-card-title">Composición por tipo de instrumento</div>' +
        '<div class="cw-stacked-bar">' + stackedBarHtml + '</div>' +
        tipoRowsHtml +
      '</div>' +

      (escenarios ? escenarios.html : '') +

      '<div class="cw-card">' +
        '<div class="cw-card-title">Detalle por instrumento</div>' +
        '<table class="cw-table">' +
          '<thead><tr>' +
            '<th>Ticker</th><th>Tipo</th><th class="cw-num">Importe</th><th class="cw-num">Participación %</th>' +
            '<th class="cw-num">Dist. media 200d</th><th class="cw-num">Rend. anual (10a)</th><th class="cw-num">Dist. máximo</th>' +
          '</tr></thead>' +
          '<tbody>' + tableRowsHtml + '</tbody>' +
        '</table>' +
        '<div class="cw-metric-note">Métricas de renta variable (Acciones y Cedear) en dólares, vía Yahoo Finance. "s/d" = sin dato disponible.</div>' +
      '</div>'
    );

    document.getElementById('cw-detail').innerHTML = html;

    if (escenarios) {
      wireScenarioCards(escenarios.detalles);
    }
  }

  function selectComitente(comitenteId) {
    var comitente = data.comitentes.find(function (c) { return c.comitente === comitenteId; });
    if (!comitente) return;
    activeComitente = comitenteId;
    document.getElementById('cw-placeholder').style.display = 'none';
    document.getElementById('cw-detail').style.display = 'block';
    renderDetail(comitente);
    renderList();
  }

  function renderPlaceholderStats() {
    var wrap = document.getElementById('cw-placeholder-stats');
    wrap.innerHTML =
      '<div class="cw-stat-chip"><div class="cw-stat-value">' + data.cantidad_comitentes + '</div><div class="cw-stat-label">Comitentes</div></div>' +
      '<div class="cw-stat-chip"><div class="cw-stat-value">' + fmtMoney(data.aum_total) + '</div><div class="cw-stat-label">AUM total</div></div>';
  }

  Promise.all([
    fetch(DATA_URL).then(function (r) { return r.json(); }),
    fetch(METRICAS_URL).then(function (r) { return r.json(); }).catch(function () { return null; }),
    fetch(RENTA_FIJA_URL).then(function (r) { return r.json(); }).catch(function () { return null; })
  ])
    .then(function (results) {
      data = results[0];
      metricas = results[1];
      rentaFija = results[2];
      filtered = data.comitentes.slice();
      renderList();
      renderPlaceholderStats();
      var fecha = new Date(data.generado);
      document.getElementById('cw-header-fecha').textContent = 'Datos actualizados al ' + fecha.toLocaleString('es-AR');
    })
    .catch(function (err) {
      document.getElementById('cw-list').innerHTML = '<div class="cw-list-empty">No se pudieron cargar los datos.</div>';
      console.error(err);
    });

  document.getElementById('cw-search').addEventListener('input', function (e) {
    applyFilter(e.target.value);
  });
})();
</script>

</body>
</html>
